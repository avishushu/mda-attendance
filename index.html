<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת נוכחות מד"א</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #d32f2f;
            --dark-blue: #1a237e;
            --light-gray: #f5f5f5;
            --white: #ffffff;
            --success-green: #2e7d32;
            --warning-orange: #ed6c02;
            --danger-red: #c62828;
            --late-yellow: #fbc02d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Heebo', sans-serif; }
        body { background-color: var(--light-gray); color: #212121; display: flex; flex-direction: column; min-height: 100vh; }

        header { background-color: var(--dark-blue); color: var(--white); padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        main { flex: 1; padding: 15px; max-width: 600px; margin: 0 auto; width: 100%; }

        .card { background: var(--white); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .clickable { cursor: pointer; transition: 0.2s; }
        .clickable:hover { background-color: #f0f2ff; }

        h2 { color: var(--dark-blue); margin-bottom: 15px; border-bottom: 3px solid var(--primary-red); display: inline-block; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }

        button { background-color: var(--primary-red); color: var(--white); border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1rem; font-weight: bold; }
        button.secondary { background-color: var(--dark-blue); }
        button.outline { background: none; border: 1px solid var(--dark-blue); color: var(--dark-blue); }
        button.danger-small { background-color: var(--danger-red); width: auto; padding: 5px 10px; font-size: 0.8rem; margin-right: 5px; }
        button.success-small { background-color: var(--success-green); width: auto; padding: 5px 10px; font-size: 0.8rem; margin-right: 5px; }
        button:disabled { background-color: #ccc; }

        .active-alert { background: #fff3e0; border: 2px solid var(--warning-orange); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .actions-cell { display: flex; gap: 5px; align-items: center; }

        .status-tag { padding: 4px 8px; border-radius: 6px; font-size: 0.8rem; color: white; font-weight: bold; }
        .bg-green { background: var(--success-green); }
        .bg-red { background: var(--danger-red); }
        .bg-yellow { background: var(--late-yellow); color: black; }
        .bg-orange { background: var(--warning-orange); }

        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .mt-10 { margin-top: 10px; }
    </style>
</head>
<body>

    <header id="app-header" class="hidden">
        <span id="user-display-name" style="font-weight: bold;"></span>
        <button onclick="window.handleLogout()" style="width: auto; padding: 5px 10px; background: none; border: 1px solid white;">יציאה 🚪</button>
    </header>

    <main>
        <section id="view-auth" class="card">
            <h2 class="text-center">כניסה למערכת</h2>
            <form id="form-login">
                <div class="form-group"><label>אימייל</label><input type="email" id="login-email" required></div>
                <div class="form-group"><label>סיסמה</label><input type="password" id="login-pass" required></div>
                <button type="submit">התחבר</button>
            </form>
        </section>

        <section id="view-student" class="hidden">
            <div id="active-session-area"></div>
            <div id="student-main-list">
                <div class="card">
                    <h2>הקורסים שלי</h2>
                    <button class="outline mb-10" onclick="window.joinNewGroup()">➕ הצטרף לקורס חדש</button>
                    <div id="student-groups-container"></div>
                </div>
            </div>
            <div id="student-history-view" class="hidden">
                <div class="card">
                    <button class="outline" style="width: auto; margin-bottom: 15px;" onclick="window.backToStudentMain()">🔙 חזור לרשימה</button>
                    <h2 id="history-title">היסטוריית מפגשים</h2>
                    <div id="history-container"></div>
                </div>
            </div>
        </section>

        <section id="view-instructor" class="hidden">
            <div id="instructor-main">
                <div class="card">
                    <h2>הקבוצות שלי</h2>
                    <button class="secondary" onclick="window.createNewGroup()">➕ פתח קבוצה חדשה</button>
                    <div id="instructor-groups-container" style="margin-top: 15px;"></div>
                </div>
            </div>

            <div id="instructor-group-details" class="hidden">
                <div class="card">
                    <button class="outline" style="width: auto; margin-bottom: 10px;" onclick="window.backToInstructorMain()">🔙 חזור</button>
                    <h2 id="group-name-header">שם הקבוצה</h2>
                    <p>קוד להרשמה: <strong id="group-code-display"></strong></p>
                    
                    <button class="secondary mt-10" id="btn-open-form">➕ פתח מפגש חדש</button>

                    <div id="session-form" class="hidden" style="background: #f0f0f0; padding: 15px; border-radius: 8px; margin-top: 10px;">
                        <div class="form-group"><label>מספר מפגש</label><input type="number" id="ns-num"></div>
                        <div class="form-group"><label>שעת התחלה (לחישוב איחור)</label><input type="time" id="ns-start"></div>
                        <div class="form-group"><label>שעת סיום אוטומטית (אופציונלי)</label><input type="time" id="ns-end"></div>
                        <button onclick="window.handleCreateSession(event)">הפעל מפגש ודגום מיקום</button>
                    </div>

                    <h3 style="margin-top: 20px;">מפגשים</h3>
                    <div id="instructor-sessions-list"></div>

                    <h3 style="margin-top: 20px;">חניכים בקבוצה</h3>
                    <div id="instructor-students-list"></div>
                </div>
            </div>

            <div id="session-report-view" class="hidden">
                <div class="card">
                    <div style="display: flex; justify-content: space-between;">
                        <button class="outline" style="width: auto;" onclick="window.backToGroupDetails()">🔙 חזור</button>
                        <button id="btn-manual-lock" style="width: auto; background: black;" class="hidden" onclick="window.manualLock()">🔒 סגור לרישום</button>
                    </div>
                    <h2 id="report-title">דוח נוכחות</h2>
                    <div id="report-container"></div>
                </div>
            </div>
        </section>
    </main>

    <div id="edit-modal" class="hidden" style="position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:9999;">
        <div class="card" style="width: 90%; max-width: 350px;">
            <h3 id="edit-name">עריכת חניך</h3>
            <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
                <button class="bg-green" onclick="window.updateStatus('on_time')">נוכח ✅</button>
                <button class="bg-yellow" onclick="window.updateStatus('late')">איחור ⏰</button>
                <button class="bg-red" onclick="window.updateStatus('absent')">חסר (מחיקה) ❌</button>
                <button class="outline" onclick="document.getElementById('edit-modal').classList.add('hidden')">ביטול</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, query, where, getDocs, serverTimestamp, updateDoc, arrayUnion, deleteField, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA7JlU7Qc6uuSP43khqCBC96KFQpk5dgOE",
            authDomain: "attendancemda.firebaseapp.com",
            projectId: "attendancemda",
            storageBucket: "attendancemda.firebasestorage.app",
            messagingSenderId: "303165146059",
            appId: "1:303165146059:web:cf698f5837c0ee96702c4e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userRole = null;
        let userData = null;
        let curGroupId = null;
        let curSessionId = null;
        let curEditUid = null;

        function showView(viewId) {
            document.querySelectorAll('section, #instructor-main, #instructor-group-details, #session-report-view, #student-main-list, #student-history-view')
                    .forEach(el => el.classList.add('hidden'));
            
            if (viewId === 'student') {
                document.getElementById('view-student').classList.remove('hidden');
                document.getElementById('student-main-list').classList.remove('hidden');
            } else if (viewId === 'instructor') {
                document.getElementById('view-instructor').classList.remove('hidden');
                document.getElementById('instructor-main').classList.remove('hidden');
            } else {
                document.getElementById(viewId).classList.remove('hidden');
            }
            document.getElementById('app-header').classList.toggle('hidden', viewId === 'view-auth');
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const uDoc = await getDoc(doc(db, "users", user.uid));
                if (uDoc.exists()) {
                    userData = uDoc.data();
                    userRole = userData.role;
                    document.getElementById('user-display-name').innerText = userData.fullName;
                    userRole === 'instructor' ? (showView('instructor'), window.loadInstructorMain()) : (showView('student'), window.loadStudentMain());
                }
            } else showView('view-auth');
        });

        // --- לוגיקת מדריך ---
        window.loadInstructorMain = async () => {
            const container = document.getElementById('instructor-groups-container');
            container.innerHTML = "טוען קבוצות...";
            const q = query(collection(db, "groups"), where("instructorId", "==", auth.currentUser.uid));
            const snaps = await getDocs(q);
            container.innerHTML = snaps.empty ? "אין קבוצות פעילות." : "";
            snaps.forEach(d => {
                const div = document.createElement('div');
                div.className = "card clickable";
                div.innerHTML = `<strong>${d.data().name}</strong>`;
                div.onclick = () => window.openGroup(d.id, d.data().name);
                container.appendChild(div);
            });
        };

        window.openGroup = async (id, name) => {
            curGroupId = id;
            showView('view-instructor');
            document.getElementById('instructor-main').classList.add('hidden');
            document.getElementById('instructor-group-details').classList.remove('hidden');
            document.getElementById('group-name-header').innerText = name;
            document.getElementById('group-code-display').innerText = id;
            
            const sQ = query(collection(db, "groups", id, "sessions"), orderBy("sessionNumber", "desc"));
            const sSnaps = await getDocs(sQ);
            const sList = document.getElementById('instructor-sessions-list');
            sList.innerHTML = sSnaps.empty ? "אין מפגשים." : "";
            
            sSnaps.forEach(sd => {
                const s = sd.data();
                const div = document.createElement('div');
                div.className = "list-item";
                
                // לוגיקת פתיחה מחדש ב-48 שעות
                let reopenBtn = "";
                if (s.status === 'closed' && s.createdAt) {
                    const createdTime = s.createdAt.toDate().getTime();
                    const now = new Date().getTime();
                    if (now - createdTime < 48 * 60 * 60 * 1000) {
                        reopenBtn = `<button class="success-small" onclick="window.reopenSession('${sd.id}', event)">פתח מחדש 🔓</button>`;
                    }
                }

                div.innerHTML = `
                    <div class="clickable" style="flex:1;" onclick="window.openReport('${sd.id}', ${s.sessionNumber}, ${JSON.stringify(s).replace(/"/g, '&quot;')})">
                        <strong>מפגש ${s.sessionNumber}</strong> 
                        <span class="status-tag ${s.status==='open'?'bg-green':'bg-red'}">${s.status==='open'?'פתוח':'סגור'}</span>
                    </div>
                    <div class="actions-cell">
                        ${reopenBtn}
                        <button class="danger-small" onclick="window.deleteSession('${sd.id}', event)">מחק 🗑️</button>
                    </div>
                `;
                sList.appendChild(div);
            });

            const gDoc = await getDoc(doc(db, "groups", id));
            const members = gDoc.data().members || [];
            const stList = document.getElementById('instructor-students-list');
            stList.innerHTML = members.length ? "" : "אין חניכים רשומים.";
            for(let uid of members) {
                const u = await getDoc(doc(db, "users", uid));
                if(u.exists()) stList.innerHTML += `<div class="list-item">👤 ${u.data().fullName}</div>`;
            }
        };

        window.deleteSession = async (sid, e) => {
            e.stopPropagation();
            if (!confirm("האם אתה בטוח שברצונך למחוק את המפגש? כל נתוני הנוכחות במפגש זה יימחקו לצמיתות.")) return;
            await deleteDoc(doc(db, "groups", curGroupId, "sessions", sid));
            window.openGroup(curGroupId, document.getElementById('group-name-header').innerText);
        };

        window.reopenSession = async (sid, e) => {
            e.stopPropagation();
            if (!confirm("לפתוח את המפגש מחדש לרישום חניכים?")) return;
            await updateDoc(doc(db, "groups", curGroupId, "sessions", sid), { status: 'open' });
            window.openGroup(curGroupId, document.getElementById('group-name-header').innerText);
        };

        window.handleCreateSession = async (e) => {
            const num = document.getElementById('ns-num').value;
            const start = document.getElementById('ns-start').value;
            const end = document.getElementById('ns-end').value;
            if(!num || !start) return alert("מלא פרטים");
            e.target.disabled = true;
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await addDoc(collection(db, "groups", curGroupId, "sessions"), {
                    sessionNumber: Number(num), expectedStartTime: start, endTime: end || null,
                    status: 'open', attendance: {}, exceptions: {},
                    instructorLocation: { lat: pos.coords.latitude, lng: pos.coords.longitude },
                    createdAt: serverTimestamp()
                });
                document.getElementById('session-form').classList.add('hidden');
                window.openGroup(curGroupId, document.getElementById('group-name-header').innerText);
            }, () => { e.target.disabled = false; alert("שגיאת GPS"); }, {enableHighAccuracy: true});
        };

        window.openReport = async (sid, snum, sdata) => {
            curSessionId = sid;
            document.getElementById('instructor-group-details').classList.add('hidden');
            document.getElementById('session-report-view').classList.remove('hidden');
            document.getElementById('report-title').innerText = `מפגש ${snum}`;
            document.getElementById('btn-manual-lock').classList.toggle('hidden', sdata.status !== 'open');
            
            const gDoc = await getDoc(doc(db, "groups", curGroupId));
            const members = gDoc.data().members || [];
            const container = document.getElementById('report-container');
            container.innerHTML = "";
            for(let uid of members) {
                const u = await getDoc(doc(db, "users", uid));
                const name = u.data().fullName;
                let status = "❌ חסר", cls = "bg-red";
                if(sdata.attendance?.[uid]) {
                    status = sdata.attendance[uid].status === 'late' ? "⏰ איחור" : "✅ נוכח";
                    cls = sdata.attendance[uid].status === 'late' ? "bg-yellow" : "bg-green";
                } else if(sdata.exceptions?.[uid]) { status = "❓ חריג מיקום"; cls = "bg-orange"; }
                const div = document.createElement('div');
                div.className = "list-item clickable";
                div.innerHTML = `<span>${name}</span> <span class="status-tag ${cls}">${status}</span>`;
                div.onclick = () => { curEditUid = uid; document.getElementById('edit-name').innerText = name; document.getElementById('edit-modal').classList.remove('hidden'); };
                container.appendChild(div);
            }
        };

        window.updateStatus = async (type) => {
            const ref = doc(db, "groups", curGroupId, "sessions", curSessionId);
            document.getElementById('edit-modal').classList.add('hidden');
            if(type === 'absent') await updateDoc(ref, { [`attendance.${curEditUid}`]: deleteField(), [`exceptions.${curEditUid}`]: deleteField() });
            else await updateDoc(ref, { [`attendance.${curEditUid}`]: { name: "", status: type, timestamp: new Date() }, [`exceptions.${curEditUid}`]: deleteField() });
            const up = await getDoc(ref); window.openReport(curSessionId, up.data().sessionNumber, up.data());
        };

        window.manualLock = async () => {
            await updateDoc(doc(db, "groups", curGroupId, "sessions", curSessionId), { status: 'closed' });
            window.backToGroupDetails();
        };

        // --- לוגיקת חניך ---
        window.loadStudentMain = async () => {
            const alertArea = document.getElementById('active-session-area');
            const groupCont = document.getElementById('student-groups-container');
            alertArea.innerHTML = ""; groupCont.innerHTML = "טוען...";
            const q = query(collection(db, "groups"), where("members", "array-contains", auth.currentUser.uid));
            const snaps = await getDocs(q);
            groupCont.innerHTML = snaps.empty ? "אין קורסים רשומים." : "";
            for(const gd of snaps.docs) {
                const g = gd.data();
                const sQ = query(collection(db, "groups", gd.id, "sessions"), where("status", "==", "open"));
                const sSnaps = await getDocs(sQ);
                sSnaps.forEach(sd => {
                    const s = sd.data();
                    if(!s.attendance?.[auth.currentUser.uid] && !s.exceptions?.[auth.currentUser.uid]) {
                        const div = document.createElement('div');
                        div.className = "active-alert";
                        div.innerHTML = `<strong>מפגש פתוח: ${g.name} (מפגש ${s.sessionNumber})</strong><br>
                        <button class="success mt-10" onclick="window.markAttend('${gd.id}', '${sd.id}', ${s.instructorLocation.lat}, ${s.instructorLocation.lng}, '${s.expectedStartTime}', '${s.endTime}', event)">דווח נוכחות כעת 📍</button>`;
                        alertArea.appendChild(div);
                    }
                });
                const div = document.createElement('div');
                div.className = "card clickable";
                div.innerHTML = `<strong>${g.name}</strong><br><small>לחץ לצפייה בהיסטוריה</small>`;
                div.onclick = () => window.openHistory(gd.id, g.name);
                groupCont.appendChild(div);
            }
        };

        window.openHistory = async (gid, gname) => {
            curGroupId = gid;
            document.getElementById('student-main-list').classList.add('hidden');
            document.getElementById('student-history-view').classList.remove('hidden');
            document.getElementById('history-title').innerText = `מפגשים: ${gname}`;
            const hCont = document.getElementById('history-container');
            hCont.innerHTML = "טוען...";
            const sQ = query(collection(db, "groups", gid, "sessions"), orderBy("sessionNumber", "desc"));
            const snaps = await getDocs(sQ);
            hCont.innerHTML = "";
            snaps.forEach(sd => {
                const s = sd.data();
                let res = "❌ חסר", cls = "bg-red";
                if(s.attendance?.[auth.currentUser.uid]) {
                    res = s.attendance[auth.currentUser.uid].status === 'late' ? "⏰ איחור" : "✅ נוכח";
                    cls = s.attendance[auth.currentUser.uid].status === 'late' ? "bg-yellow" : "bg-green";
                } else if(s.exceptions?.[auth.currentUser.uid]) { res = "❓ חריג מיקום"; cls = "bg-orange"; }
                const div = document.createElement('div');
                div.className = "list-item";
                div.innerHTML = `<span>מפגש ${s.sessionNumber}</span> <span class="status-tag ${cls}">${res}</span>`;
                hCont.appendChild(div);
            });
        };

        window.markAttend = async (gid, sid, iLat, iLng, start, end, e) => {
            const btn = e.target;
            if(end) {
                const [h, m] = end.split(':'); const now = new Date(); const limit = new Date();
                limit.setHours(h, m, 0); if(now > limit) return alert("המפגש נסגר.");
            }
            btn.disabled = true;
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const R = 6371e3;
                const dLat = (pos.coords.latitude - iLat) * Math.PI / 180;
                const dLon = (pos.coords.longitude - iLng) * Math.PI / 180;
                const a = Math.sin(dLat/2)**2 + Math.cos(iLat*Math.PI/180)*Math.cos(pos.coords.latitude*Math.PI/180)*Math.sin(dLon/2)**2;
                const dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                let stat = 'on_time';
                if(start) {
                    const [h, m] = start.split(':'); const limit = new Date(); limit.setHours(h, Number(m)+10);
                    if(new Date() > limit) stat = 'late';
                }
                const ref = doc(db, "groups", gid, "sessions", sid);
                if(dist <= 70) await updateDoc(ref, { [`attendance.${auth.currentUser.uid}`]: { name: userData.fullName, status: stat, timestamp: serverTimestamp() } });
                else await updateDoc(ref, { [`exceptions.${auth.currentUser.uid}`]: { name: userData.fullName, status: 'pending', timestamp: serverTimestamp() } });
                alert(dist <= 70 ? "נוכחות סומנה!" : "חריג מיקום נשלח");
                window.loadStudentMain();
            }, () => { btn.disabled = false; alert("נא לאשר GPS"); }, {enableHighAccuracy: true});
        };

        window.backToInstructorMain = () => showView('instructor');
        window.backToGroupDetails = () => window.openGroup(curGroupId, document.getElementById('group-name-header').innerText);
        window.backToStudentMain = () => window.loadStudentMain();
        window.handleLogout = () => signOut(auth);
        document.getElementById('btn-open-form').onclick = () => document.getElementById('session-form').classList.toggle('hidden');

        window.joinNewGroup = async () => {
            const code = prompt("הכנס קוד קורס:"); if(!code) return;
            const ref = doc(db, "groups", code);
            if(!(await getDoc(ref)).exists()) return alert("לא תקין");
            await updateDoc(ref, { members: arrayUnion(auth.currentUser.uid) });
            window.loadStudentMain();
        };

        window.createNewGroup = async () => {
            const n = prompt("שם הקורס:"); if(!n) return;
            await addDoc(collection(db, "groups"), { name: n, instructorId: auth.currentUser.uid, members: [], createdAt: serverTimestamp() });
            window.loadInstructorMain();
        };

        document.getElementById('form-login').onsubmit = async (e) => {
            e.preventDefault();
            try { await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-pass').value); }
            catch { alert("שגיאה"); }
        };
    </script>
</body>
</html>
