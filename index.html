<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>Attendance App</title>
  <style>
    body {
      font-family: Arial;
      background: #0b0f1a;
      color: white;
      text-align: center;
    }

    input, button {
      margin: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #1e90ff;
      color: white;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<h1>מערכת נוכחות</h1>

<div id="auth">
  <h2>התחברות</h2>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
</div>

<div id="dashboard" class="hidden">
  <h2 id="welcome"></h2>
  <button onclick="createGroup()">צור קבוצה</button>
  <button onclick="joinGroup()">הצטרף לקבוצה</button>
  <button onclick="openSession()">פתח מפגש</button>
  <button onclick="markAttendance()">אני בשיעור</button>
  <button onclick="logout()">התנתק</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA7JlU7Qc6uuSP43khqCBC96KFQpk5dgOE",
  authDomain: "attendancemda.firebaseapp.com",
  projectId: "attendancemda",
  storageBucket: "attendancemda.firebasestorage.app",
  messagingSenderId: "303165146059",
  appId: "1:303165146059:web:cf698f5837c0ee96702c4e",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

// ===== AUTH =====

window.register = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const userCred = await createUserWithEmailAndPassword(auth, email, password);

  await setDoc(doc(db, "users", userCred.user.uid), {
    email,
    role: "student"
  });

  alert("נרשמת בהצלחה");
};

window.login = async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const userCred = await signInWithEmailAndPassword(auth, email, password);

  document.getElementById("auth").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
  document.getElementById("welcome").innerText = "שלום " + email;
};

window.logout = async () => {
  await signOut(auth);
  location.reload();
};

// ===== GROUP =====

window.createGroup = async () => {
  const name = prompt("שם קבוצה:");
  const user = auth.currentUser;

  await setDoc(doc(db, "groups", name), {
    name,
    instructor: user.uid
  });

  alert("קבוצה נוצרה");
};

window.joinGroup = async () => {
  const name = prompt("שם קבוצה:");
  const user = auth.currentUser;

  await setDoc(doc(db, "groups", name + "_student_" + user.uid), {
    group: name,
    user: user.uid
  });

  alert("נשלחה בקשת הצטרפות");
};

// ===== SESSION =====

window.openSession = () => {
  navigator.geolocation.getCurrentPosition(async (pos) => {
    const { latitude, longitude } = pos.coords;

    await setDoc(doc(db, "session", "active"), {
      lat: latitude,
      lng: longitude,
      open: true
    });

    alert("מפגש נפתח");
  }, () => {
    alert("אין גישה למיקום");
  });
};

// ===== ATTENDANCE =====

window.markAttendance = () => {
  navigator.geolocation.getCurrentPosition(async (pos) => {

    const sessionSnap = await getDoc(doc(db, "session", "active"));
    const session = sessionSnap.data();

    const distance = getDistance(
      pos.coords.latitude,
      pos.coords.longitude,
      session.lat,
      session.lng
    );

    if (distance <= 0.07) {
      alert("נוכחות נקלטה ✅");
    } else {
      alert("אתה מחוץ לטווח ❌");
    }

  }, () => {
    alert("אין GPS");
  });
};

// ===== DISTANCE =====

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(lat1 * Math.PI / 180) *
    Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLon / 2) * Math.sin(dLon / 2);

  return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
}
</script>

</body>
</html>
