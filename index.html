<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>נוכחות מד"א</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --mda-red: #e31e24; 
            --mda-dark: #1a252f; 
            --bg-light: #f8fafc;
            --text-main: #2d3748;
        }

        * { box-sizing: border-box; font-family: 'Assistant', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: var(--bg-light); margin: 0; padding: 0; min-height: 100vh; color: var(--text-main); }

        /* כותרת עליונה מעוצבת */
        .app-header { 
            background: var(--mda-red); 
            padding: 40px 20px 80px; 
            border-radius: 0 0 50px 50px; 
            color: white; 
            box-shadow: 0 10px 20px rgba(227, 30, 36, 0.15);
            text-align: center;
        }

        .main-container { max-width: 480px; margin: -60px auto 40px; padding: 0 20px; }

        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            margin-bottom: 25px;
            border: 1px solid rgba(0,0,0,0.03);
        }

        h1 { font-weight: 800; font-size: 28px; margin: 0; }
        h3 { font-weight: 700; font-size: 20px; margin-bottom: 15px; color: var(--mda-dark); }
        
        input { 
            width: 100%; padding: 18px; margin: 12px 0; 
            border: 2px solid #e2e8f0; border-radius: 20px; 
            font-size: 16px; background: #fff; transition: 0.2s;
            color: var(--mda-dark);
        }
        input:focus { border-color: var(--mda-red); outline: none; box-shadow: 0 0 0 4px rgba(227, 30, 36, 0.1); }

        .btn-primary { 
            width: 100%; padding: 18px; border: none; border-radius: 20px; 
            font-weight: 800; font-size: 18px; cursor: pointer; color: white; 
            background: linear-gradient(135deg, #e31e24, #b9181d); 
            box-shadow: 0 8px 20px rgba(227, 30, 36, 0.3); transition: 0.3s;
        }
        .btn-primary:active { transform: scale(0.98); }

        /* כפתור הדיווח הגדול */
        .pulse-button { 
            width: 130px; height: 130px; border-radius: 50%; 
            background: var(--mda-red); border: none; color: white; 
            font-size: 22px; font-weight: 800; cursor: pointer; 
            animation: pulse 2s infinite; margin: 20px auto; display: block;
            box-shadow: 0 10px 25px rgba(227, 30, 36, 0.4);
        }

        @keyframes pulse { 
            0% { box-shadow: 0 0 0 0 rgba(227, 30, 36, 0.7); } 
            70% { box-shadow: 0 0 0 25px rgba(227, 30, 36, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(227, 30, 36, 0); } 
        }

        /* ניהול קבוצה */
        .group-tag {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.2); padding: 6px 15px;
            border-radius: 12px; font-size: 13px; cursor: pointer; margin-top: 10px;
        }

        .history-item { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 18px 0; border-bottom: 1px solid #f1f5f9; 
        }
        .history-item:last-child { border: none; }
        
        .badge { padding: 8px 16px; border-radius: 12px; font-size: 14px; font-weight: 700; }
        .badge-present { background: #dcfce7; color: #166534; }
        .badge-absent { background: #fee2e2; color: #991b1b; }

        .hidden { display: none !important; }
        .logo-img { max-height: 70px; margin-bottom: 15px; }

        /* הודעת סטטוס ברורה */
        #meeting-status { font-size: 18px; font-weight: 700; color: var(--mda-dark); margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="app-header"><h1>נוכחות מתנדבים</h1></div>
    <div class="main-container">
        <div class="card" style="text-align: center;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Magen_David_Adom_Logo.svg/500px-Magen_David_Adom_Logo.svg.png" class="logo-img" alt="מדא">
            <input type="text" id="reg-name" placeholder="שם מלא">
            <input type="number" id="reg-id" placeholder="תעודת זהות" inputmode="numeric">
            <input type="text" id="reg-code" placeholder="קוד קבוצה (אופציונלי)">
            <button class="btn-primary" onclick="handleAuth()">כניסה מהירה</button>
        </div>
    </div>
</div>

<div id="student-screen" class="hidden">
    <div class="app-header">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; padding: 0 10px;">
            <div style="text-align: right;">
                <span style="font-size:15px; opacity:0.9;">שלום,</span>
                <h2 id="st-name" style="margin:0; font-size:24px; font-weight: 800;">---</h2>
                <div class="group-tag" onclick="changeGroup()">
                    <span>📍 קבוצה: <span id="st-group-name">ללא</span></span>
                    <span style="text-decoration: underline; font-size: 11px;">(שנה)</span>
                </div>
            </div>
            <button onclick="logout()" style="background:white; border:none; color:var(--mda-red); padding:10px 15px; border-radius:15px; font-weight:700; font-size:13px; cursor:pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">התנתק</button>
        </div>
    </div>
    <div class="main-container">
        <div class="card" style="text-align:center;">
            <div id="meeting-status">מחפש מפגש פעיל...</div>
            <div id="active-ui" class="hidden">
                <button class="pulse-button" id="btn-report" onclick="doCheckIn()">דווח!</button>
                <p style="font-size:14px; color:#64748b; font-weight: 600;">יש לוודא שה-GPS פועל</p>
            </div>
        </div>
        
        <h3 style="margin-right: 10px;">היסטוריית נוכחות</h3>
        <div class="card" id="st-history">
            <p style="text-align:center; color:gray;">טוען נתונים...</p>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyA7JlU7Qc6uuSP43khqCBC96KFQpk5dgOE",
      authDomain: "attendancemda.firebaseapp.com",
      projectId: "attendancemda",
      storageBucket: "attendancemda.firebasestorage.app",
      messagingSenderId: "303165146059",
      appId: "1:303165146059:web:606d5d5ece96d9fe702c4e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    let meetingListener = null;

    auth.signInAnonymously().catch(e => console.error("Auth Error", e));

    window.onload = () => {
        const saved = localStorage.getItem('mda_user');
        if(saved) showDashboard(JSON.parse(saved));
    };

    async function handleAuth() {
        const name = document.getElementById('reg-name').value.trim();
        const idNum = document.getElementById('reg-id').value.trim();
        const code = document.getElementById('reg-code').value.trim();
        const user = auth.currentUser;

        if(!name || !idNum || !user) return alert("אנא מלאו שם ותעודת זהות");

        let groupId = null;
        if(code) {
            const gSnap = await db.collection('groups_v2').where('code', '==', code).limit(1).get();
            if(!gSnap.empty) {
                groupId = gSnap.docs[0].id;
                await gSnap.docs[0].ref.collection('roster').doc(user.uid).set({ name, idNum, uid: user.uid }, {merge:true});
            } else {
                alert("קוד קבוצה לא נמצא. נכנס ללא קבוצה.");
            }
        }

        const userData = { name, idNum, groupId };
        localStorage.setItem('mda_user', JSON.stringify(userData));
        showDashboard(userData);
    }

    async function showDashboard(user) {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('student-screen').classList.remove('hidden');
        document.getElementById('st-name').innerText = user.name;
        
        if(user.groupId) {
            const gDoc = await db.collection('groups_v2').doc(user.groupId).get();
            document.getElementById('st-group-name').innerText = gDoc.data()?.name || "מחובר";
            startListener(user.groupId);
            loadHistory(user);
        } else {
            document.getElementById('st-group-name').innerText = "לא מוגדרת";
            document.getElementById('meeting-status').innerText = "יש להתחבר לקבוצה כדי לדווח";
        }
    }

    function changeGroup() {
        const newCode = prompt("הזן קוד קבוצה חדש:");
        if(!newCode) return;
        
        db.collection('groups_v2').where('code', '==', newCode).limit(1).get().then(s => {
            if(s.empty) return alert("קוד לא תקין");
            const userData = JSON.parse(localStorage.getItem('mda_user'));
            userData.groupId = s.docs[0].id;
            localStorage.setItem('mda_user', JSON.stringify(userData));
            location.reload();
        });
    }

    function startListener(gid) {
        if(meetingListener) meetingListener();
        meetingListener = db.collection('groups_v2').doc(gid).collection('meetings')
            .where('isOpen', '==', true).onSnapshot(s => {
                const ui = document.getElementById('active-ui');
                const label = document.getElementById('meeting-status');
                if(s.empty) { 
                    label.innerText = "אין מפגש פעיל כרגע"; 
                    ui.classList.add('hidden'); 
                } else {
                    window.curM = { id: s.docs[0].id, ref: s.docs[0].ref, ...s.docs[0].data() };
                    label.innerHTML = `<span style="color:var(--mda-red)">●</span> מפגש ${window.curM.number || ""} פתוח לדיווח`;
                    ui.classList.remove('hidden');
                }
            });
    }

    async function doCheckIn() {
        const user = auth.currentUser;
        const savedData = JSON.parse(localStorage.getItem('mda_user'));
        if(!user || !savedData) return;

        const btn = document.getElementById('btn-report');
        btn.disabled = true;
        btn.innerText = "שולח...";

        navigator.geolocation.getCurrentPosition(async p => {
            try {
                await window.curM.ref.collection('attendance').doc(user.uid).set({
                    name: savedData.name, idNum: savedData.idNum,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    location: new firebase.firestore.GeoPoint(p.coords.latitude, p.coords.longitude)
                });
                confetti(); alert("הדיווח התקבל בהצלחה!");
                loadHistory(savedData);
            } catch(e) { alert("שגיאה בדיווח"); }
            finally { btn.disabled = false; btn.innerText = "דווח!"; }
        }, () => { 
            alert("חובה להפעיל GPS"); 
            btn.disabled = false; 
            btn.innerText = "דווח!";
        });
    }

    async function loadHistory(user) {
        const container = document.getElementById('st-history');
        const mSnap = await db.collection('groups_v2').doc(user.groupId).collection('meetings').orderBy('number', 'desc').get();
        if(mSnap.empty) {
            container.innerHTML = "<p style='text-align:center; color:gray;'>אין היסטוריית מפגשים</p>";
            return;
        }

        const attPromises = mSnap.docs.map(m => m.ref.collection('attendance').doc(auth.currentUser.uid).get());
        const results = await Promise.all(attPromises);

        let html = "";
        results.forEach((att, i) => {
            const isPresent = att.exists;
            html += `<div class="history-item">
                <span style="font-weight:700;">מפגש ${mSnap.docs[i].data().number || (i+1)}</span>
                <span class="badge ${isPresent ? 'badge-present' : 'badge-absent'}">${isPresent ? 'נוכח' : 'חיסור'}</span>
            </div>`;
        });
        container.innerHTML = html;
    }

    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
