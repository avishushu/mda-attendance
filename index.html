<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מערכת נוכחות - גרסה סופית</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --mda-red: #e31e24; --mda-dark: #1a252f; --admin-blue: #2b6cb0; --bg-light: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Assistant', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-light); margin: 0; padding: 0; min-height: 100vh; }
        .app-header { background: var(--mda-red); padding: 40px 20px 60px; border-radius: 0 0 40px 40px; color: white; text-align: center; transition: background 0.5s; }
        .main-container { max-width: 600px; margin: -40px auto 40px; padding: 0 20px; }
        .card { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 15px; font-size: 16px; text-align: right; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 15px; font-weight: 800; font-size: 18px; cursor: pointer; color: white; }
        .btn-mda { background: var(--mda-red); }
        .btn-admin { background: var(--admin-blue); }
        .hidden { display: none !important; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { text-align: right; padding: 10px; border-bottom: 1px solid #edf2f7; }
        .badge { padding: 4px 10px; border-radius: 8px; font-weight: 700; }
        .status-open { color: #2f855a; font-weight: 800; }
    </style>
</head>
<body>

<div id="loader" style="position:fixed; inset:0; background:white; z-index:9999; display:flex; align-items:center; justify-content:center; font-weight:800;">מתחבר למערכת...</div>

<div id="auth-screen" class="hidden">
    <div class="app-header"><h1>מערכת נוכחות</h1></div>
    <div class="main-container">
        <div class="card" style="text-align: center;">
            <h3>הזדהות</h3>
            <input type="text" id="reg-name" placeholder="שם מלא">
            <input type="email" id="reg-email" placeholder="כתובת אימייל">
            <button class="btn btn-mda" id="login-btn" onclick="processLogin()">כניסה</button>
        </div>
    </div>
</div>

<div id="student-view" class="hidden">
    <div class="app-header">
        <h2 id="st-welcome">שלום</h2>
        <button onclick="logout()" style="background:rgba(255,255,255,0.2); border:none; color:white; padding:5px 15px; border-radius:10px; cursor:pointer;">התנתק</button>
    </div>
    <div class="main-container">
        <div id="st-join-group" class="card hidden">
            <h3>שיבוץ לקבוצה</h3>
            <input type="text" id="st-group-code" placeholder="הזן קוד קבוצה שקיבלת">
            <button class="btn btn-mda" onclick="studentJoinGroup()">הצטרף לקבוצה</button>
        </div>
        <div id="st-active-area" class="card hidden" style="text-align:center;">
            <div id="st-meeting-status">מחפש מפגש...</div>
            <div id="st-report-btn-area" class="hidden">
                <button class="btn btn-mda" style="margin-top:20px; border-radius:50%; width:140px; height:140px; font-size:24px;" onclick="doReport()">דווח!</button>
            </div>
        </div>
        <div class="card" id="st-history-area">
            <h3>היסטוריית נוכחות</h3>
            <div id="st-history-list">טוען...</div>
        </div>
    </div>
</div>

<div id="admin-view" class="hidden">
    <div class="app-header" id="admin-header" style="background: var(--admin-blue);">
        <h2 id="admin-welcome">ניהול מערכת</h2>
        <span style="background:rgba(0,0,0,0.2); padding:2px 10px; border-radius:5px; font-size:12px;">מנהל ראשי</span>
    </div>
    <div class="main-container">
        <div class="card">
            <h3>בחירת קבוצה</h3>
            <input type="text" id="admin-target-group" placeholder="הזן קוד קבוצה (למשל 101)">
            <button class="btn btn-admin" onclick="loadAdminGroup()">טען נתוני קבוצה</button>
        </div>
        <div id="admin-controls" class="hidden">
            <div class="card" style="text-align:center;">
                <h3 id="adm-m-status">סטטוס מפגש</h3>
                <button class="btn btn-admin" id="adm-m-btn" onclick="adminToggleMeeting()">פתח מפגש חדש</button>
            </div>
            <div class="card">
                <h3>חניכים רשומים</h3>
                <div style="overflow-x:auto;">
                    <table>
                        <thead><tr><th>שם</th><th>מייל</th><th>נוכחות</th></tr></thead>
                        <tbody id="adm-roster"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyA7JlU7Qc6uuSP43khqCBC96KFQpk5dgOE",
      authDomain: "attendancemda.firebaseapp.com",
      projectId: "attendancemda",
      storageBucket: "attendancemda.firebasestorage.app",
      messagingSenderId: "303165146059",
      appId: "1:303165146059:web:606d5d5ece96d9fe702c4e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    const ADMIN_EMAIL = "anfinityroot@gmail.com"; // המייל שלך מוגדר כ-Admin קבוע

    auth.onAuthStateChanged(user => {
        document.getElementById('loader').classList.add('hidden');
        if (!user) {
            auth.signInAnonymously();
        } else {
            const saved = localStorage.getItem('mda_session');
            if (saved) routeUser(JSON.parse(saved));
            else document.getElementById('auth-screen').classList.remove('hidden');
        }
    });

    async function processLogin() {
        const email = document.getElementById('reg-email').value.trim().toLowerCase();
        const name = document.getElementById('reg-name').value.trim();
        
        if (!email || !name) return alert("נא למלא את כל השדות");

        let role = 'student';
        // בדיקת מייל מנהל
        if (email === ADMIN_EMAIL) {
            role = 'admin';
        } else {
            // בדיקה ב-Database למקרה של מדריכים נוספים
            const roleDoc = await db.collection('users_roles').doc(email).get();
            if (roleDoc.exists) role = roleDoc.data().role;
        }

        const session = { email, name, role, groupId: null };
        localStorage.setItem('mda_session', JSON.stringify(session));
        routeUser(session);
    }

    function routeUser(user) {
        document.getElementById('auth-screen').classList.add('hidden');
        if (user.role === 'admin' || user.role === 'instructor') {
            document.getElementById('admin-view').classList.remove('hidden');
            document.getElementById('admin-welcome').innerText = `שלום, ${user.name}`;
        } else {
            document.getElementById('student-view').classList.remove('hidden');
            document.getElementById('st-welcome').innerText = `שלום, ${user.name}`;
            if (user.groupId) initStudentView(user.groupId);
            else document.getElementById('st-join-group').classList.remove('hidden');
        }
    }

    // --- לוגיקת חניך ---
    async function studentJoinGroup() {
        const code = document.getElementById('st-group-code').value.trim();
        const snap = await db.collection('groups_v2').where('code', '==', code).get();
        if (snap.empty) return alert("קוד קבוצה לא נמצא");

        const session = JSON.parse(localStorage.getItem('mda_session'));
        session.groupId = snap.docs[0].id;
        localStorage.setItem('mda_session', JSON.stringify(session));

        await snap.docs[0].ref.collection('roster').doc(auth.currentUser.uid).set({
            name: session.name, email: session.email
        }, {merge:true});

        location.reload();
    }

    function initStudentView(gid) {
        document.getElementById('st-active-area').classList.remove('hidden');
        db.collection('groups_v2').doc(gid).collection('meetings').where('isOpen', '==', true).onSnapshot(s => {
            const btn = document.getElementById('st-report-btn-area');
            const txt = document.getElementById('st-meeting-status');
            if (s.empty) {
                txt.innerText = "אין מפגש פעיל כרגע";
                btn.classList.add('hidden');
            } else {
                window.activeM = s.docs[0];
                txt.innerHTML = "<span class='status-open'>● מפגש פתוח - דווח נוכחות!</span>";
                btn.classList.remove('hidden');
            }
        });
        loadHistory(gid);
    }

    async function doReport() {
        if (!window.activeM) return;
        const session = JSON.parse(localStorage.getItem('mda_session'));
        await window.activeM.ref.collection('attendance').doc(auth.currentUser.uid).set({
            name: session.name, timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        confetti(); alert("נוכחות דווחה בהצלחה!");
    }

    async function loadHistory(gid) {
        const mSnap = await db.collection('groups_v2').doc(gid).collection('meetings').get();
        let h = "";
        for (let doc of mSnap.docs) {
            const att = await doc.ref.collection('attendance').doc(auth.currentUser.uid).get();
            h += `<div style="display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding:5px 0;">
                <span>מפגש ${doc.data().number || ''}</span>
                <b style="color:${att.exists ? 'green':'red'}">${att.exists ? 'נוכח':'חיסור'}</b>
            </div>`;
        }
        document.getElementById('st-history-list').innerHTML = h || "אין היסטוריה";
    }

    // --- לוגיקת מנהל ---
    async function loadAdminGroup() {
        const code = document.getElementById('admin-target-group').value.trim();
        const snap = await db.collection('groups_v2').where('code', '==', code).get();
        if (snap.empty) return alert("קבוצה לא נמצאה");
        
        const gid = snap.docs[0].id;
        window.adminGid = gid;
        document.getElementById('admin-controls').classList.remove('hidden');

        db.collection('groups_v2').doc(gid).collection('meetings').where('isOpen', '==', true).onSnapshot(s => {
            window.adminActiveM = s.empty ? null : s.docs[0];
            document.getElementById('adm-m-status').innerText = s.empty ? "אין מפגש פתוח" : "מפגש פעיל כרגע";
            document.getElementById('adm-m-btn').innerText = s.empty ? "פתח מפגש" : "סגור מפגש";
        });

        db.collection('groups_v2').doc(gid).collection('roster').onSnapshot(s => {
            let h = "";
            s.forEach(d => {
                const p = d.data();
                h += `<tr><td>${p.name}</td><td>${p.email}</td><td>רשום</td></tr>`;
            });
            document.getElementById('adm-roster').innerHTML = h;
        });
    }

    async function adminToggleMeeting() {
        const ref = db.collection('groups_v2').doc(window.adminGid).collection('meetings');
        if (window.adminActiveM) await ref.doc(window.adminActiveM.id).update({ isOpen: false });
        else await ref.add({ isOpen: true, number: Math.floor(Math.random()*90)+10, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    }

    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
