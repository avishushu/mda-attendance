<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Attendance Pro</title>

<style>
body {
  background:#0b0f1a;
  color:white;
  font-family:Arial;
  text-align:center;
}

.card {
  background:#111827;
  margin:15px;
  padding:15px;
  border-radius:10px;
}

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#1e90ff;
  color:white;
}

input {
  padding:10px;
  margin:5px;
}

.green {background:#16a34a;}
.orange {background:#f97316;}
.red {background:#dc2626;}
</style>
</head>

<body>

<h1>מערכת נוכחות</h1>

<div id="auth">
<input id="email" placeholder="email"><br>
<input id="password" type="password" placeholder="password"><br>
<select id="role">
  <option value="student">תלמיד</option>
  <option value="instructor">מדריך</option>
</select><br>
<button onclick="register()">הרשמה</button>
<button onclick="login()">כניסה</button>
</div>

<div id="app" style="display:none">

<h2 id="userInfo"></h2>

<div class="card">
<h3>קבוצות</h3>
<input id="groupName" placeholder="שם קבוצה">
<button onclick="createGroup()">צור</button><br>

<input id="joinCode" placeholder="קוד קבוצה">
<button onclick="joinGroup()">הצטרף</button>

<div id="groups"></div>
</div>

<div class="card">
<h3>מפגש</h3>
<button onclick="openSession()">פתח מפגש</button>
<button onclick="markAttendance()">אני בשיעור</button>
</div>

<div class="card">
<h3>נוכחות</h3>
<div id="attendanceList"></div>
</div>

<button onclick="logout()">התנתק</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "attendancemda.firebaseapp.com",
  projectId: "attendancemda"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let currentUser = null;
let currentRole = null;

// ===== AUTH =====

window.register = async () => {
  const email = emailEl.value;
  const password = passwordEl.value;
  const role = roleEl.value;

  const user = await createUserWithEmailAndPassword(auth, email, password);

  await setDoc(doc(db,"users",user.user.uid),{
    email, role
  });

  alert("נרשמת");
};

window.login = async () => {
  const email = emailEl.value;
  const password = passwordEl.value;

  const res = await signInWithEmailAndPassword(auth,email,password);
  currentUser = res.user;

  const userDoc = await getDoc(doc(db,"users",currentUser.uid));
  currentRole = userDoc.data().role;

  document.getElementById("auth").style.display="none";
  document.getElementById("app").style.display="block";

  userInfo.innerText = email + " | " + currentRole;

  loadGroups();
};

// ===== GROUPS =====

window.createGroup = async () => {
  if(currentRole !== "instructor") return alert("רק מדריך");

  const name = groupName.value;
  const code = Math.random().toString(36).substring(2,7);

  await addDoc(collection(db,"groups"),{
    name,
    code,
    instructor: currentUser.uid
  });

  alert("קוד קבוצה: "+code);
  loadGroups();
};

window.joinGroup = async () => {
  const code = joinCode.value;

  const q = query(collection(db,"groups"), where("code","==",code));
  const snap = await getDocs(q);

  snap.forEach(async docu=>{
    await addDoc(collection(db,"members"),{
      groupId: docu.id,
      userId: currentUser.uid
    });
  });

  alert("הצטרפת");
  loadGroups();
};

async function loadGroups(){
  groups.innerHTML="";

  const snap = await getDocs(collection(db,"groups"));

  snap.forEach(g=>{
    const div = document.createElement("div");
    div.innerText = g.data().name;
    groups.appendChild(div);
  });
}

// ===== SESSION =====

window.openSession = () => {
navigator.geolocation.getCurrentPosition(async pos=>{
  await setDoc(doc(db,"session","active"),{
    lat:pos.coords.latitude,
    lng:pos.coords.longitude,
    start:Date.now()
  });

  alert("מפגש נפתח");
});
};

// ===== ATTENDANCE =====

window.markAttendance = () => {
navigator.geolocation.getCurrentPosition(async pos=>{

  const session = (await getDoc(doc(db,"session","active"))).data();

  const dist = distance(
    pos.coords.latitude,
    pos.coords.longitude,
    session.lat,
    session.lng
  );

  let status = "on_time";

  if(Date.now() - session.start > 5*60*1000){
    status = "late";
  }

  await addDoc(collection(db,"attendance"),{
    user:currentUser.uid,
    time:Date.now(),
    status,
    distance:dist
  });

  alert(status === "on_time" ? "בזמן" : "איחור");

  loadAttendance();

});
};

async function loadAttendance(){
  attendanceList.innerHTML="";

  const snap = await getDocs(collection(db,"attendance"));

  snap.forEach(a=>{
    const d = a.data();

    const div = document.createElement("div");

    div.className =
      d.status==="on_time" ? "green" :
      d.status==="late" ? "orange" : "red";

    div.innerText = d.user + " - " + d.status;

    attendanceList.appendChild(div);
  });
}

// ===== UTIL =====

function distance(lat1,lon1,lat2,lon2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;

  const a=Math.sin(dLat/2)**2+
  Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
  Math.sin(dLon/2)**2;

  return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

window.logout = async ()=>{
  await signOut(auth);
  location.reload();
};

// quick refs
const emailEl = document.getElementById("email");
const passwordEl = document.getElementById("password");
const roleEl = document.getElementById("role");
</script>

</body>
</html>
