<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מערכת נוכחות</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --mda-red: #e31e24; --mda-dark: #1a252f; --bg-light: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Assistant', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-light); margin: 0; padding: 0; min-height: 100vh; }
        .app-header { background: var(--mda-red); padding: 40px 20px 80px; border-radius: 0 0 50px 50px; color: white; text-align: center; }
        .main-container { max-width: 480px; margin: -60px auto 40px; padding: 0 20px; }
        .card { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin-bottom: 25px; }
        .app-title { font-size: 32px; font-weight: 800; margin-bottom: 5px; }
        input { width: 100%; padding: 18px; margin: 12px 0; border: 2px solid #e2e8f0; border-radius: 20px; font-size: 16px; }
        .btn-primary { width: 100%; padding: 18px; border: none; border-radius: 20px; font-weight: 800; font-size: 18px; cursor: pointer; color: white; background: linear-gradient(135deg, #e31e24, #b9181d); }
        .btn-primary:disabled { background: #cbd5e0; }
        .pulse-button { width: 130px; height: 130px; border-radius: 50%; background: var(--mda-red); border: none; color: white; font-size: 22px; font-weight: 800; animation: pulse 2s infinite; margin: 20px auto; display: block; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(227, 30, 36, 0.7); } 70% { box-shadow: 0 0 0 25px rgba(227, 30, 36, 0); } 100% { box-shadow: 0 0 0 0 rgba(227, 30, 36, 0); } }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; padding: 20px; overflow-y: auto; }
        .hidden { display: none !important; }
        .group-tag { background: #edf2f7; padding: 5px 12px; border-radius: 10px; font-size: 14px; font-weight: 600; display: inline-block; margin-top: 5px; color: #4a5568; }
    </style>
</head>
<body>

<div id="loading-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:2000; display:flex; align-items:center; justify-content:center; font-weight:800;">
    טוען מערכת...
</div>

<div id="auth-screen" class="hidden">
    <div class="app-header">
        <div class="app-title">מערכת נוכחות</div>
        <div style="font-size: 16px; opacity: 0.9;">אנא הזן פרטים לזיהוי</div>
    </div>
    <div class="main-container">
        <div class="card" style="text-align: center;">
            <input type="text" id="reg-name" placeholder="שם מלא" oninput="validateAuthForm()">
            <input type="number" id="reg-id" placeholder="תעודת זהות" inputmode="numeric" oninput="validateAuthForm()">
            <input type="email" id="reg-email" placeholder="כתובת אימייל" oninput="validateAuthForm()">
            <button class="btn-primary" id="btn-login" disabled onclick="handleAuth()">כניסה למערכת</button>
        </div>
    </div>
</div>

<div id="student-screen" class="hidden">
    <div class="app-header">
        <div style="display:flex; justify-content:space-between; align-items:center; padding: 0 10px;">
            <div style="text-align: right;">
                <h2 id="st-name" style="margin:0; font-size:22px; font-weight: 800;">---</h2>
                <div id="group-display" class="group-tag">טרם שובצת לקבוצה</div>
            </div>
            <button onclick="logout()" style="background:white; border:none; color:var(--mda-red); padding:10px 15px; border-radius:15px; font-weight:700;">התנתק</button>
        </div>
    </div>
    <div class="main-container">
        <div id="no-group-ui" class="card" style="text-align:center;">
            <h3>שיבוץ לקבוצה</h3>
            <p>הזן קוד קבוצה שקיבלת מהמדריך:</p>
            <input type="text" id="join-group-code" placeholder="קוד קבוצה (למשל: 101)">
            <button class="btn-primary" onclick="joinGroup()">הצטרף לקבוצה</button>
        </div>

        <div id="active-group-ui" class="hidden">
            <div class="card" style="text-align:center;">
                <div id="meeting-status" style="font-weight:700; font-size:18px;">מחפש מפגש...</div>
                <div id="active-ui" class="hidden">
                    <button class="pulse-button" onclick="doCheckIn()">דווח!</button>
                    <p style="color:gray; font-size:14px;">נא לוודא GPS פועל</p>
                </div>
            </div>
            <h3>היסטוריית נוכחות</h3>
            <div class="card" id="st-history">טוען...</div>
        </div>

        <div style="text-align:center; margin-top: 10px;">
            <span onclick="toggleProfile(true)" style="cursor:pointer; font-size: 14px; text-decoration: underline; color:gray;">⚙️ עדכון פרטים אישיים</span>
        </div>
    </div>
</div>

<div id="profile-screen" class="overlay hidden">
    <div style="max-width: 480px; margin: 0 auto;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>פרופיל אישי</h2>
            <button onclick="toggleProfile(false)" style="background:none; border:none; font-size:24px;">✕</button>
        </div>
        <p>עדכן את מספר הטלפון שלך:</p>
        <input type="tel" id="p-phone" placeholder="מספר טלפון">
        <button class="btn-primary" onclick="saveProfile()">שמור שינויים</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyA7JlU7Qc6uuSP43khqCBC96KFQpk5dgOE",
      authDomain: "attendancemda.firebaseapp.com",
      projectId: "attendancemda",
      storageBucket: "attendancemda.firebasestorage.app",
      messagingSenderId: "303165146059",
      appId: "1:303165146059:web:606d5d5ece96d9fe702c4e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    auth.onAuthStateChanged(user => {
        document.getElementById('loading-screen').classList.add('hidden');
        if (!user) {
            auth.signInAnonymously();
        } else {
            const saved = localStorage.getItem('mda_user');
            if (saved) showDashboard(JSON.parse(saved));
            else document.getElementById('auth-screen').classList.remove('hidden');
        }
    });

    function validateAuthForm() {
        const name = document.getElementById('reg-name').value.trim();
        const idNum = document.getElementById('reg-id').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        document.getElementById('btn-login').disabled = (name.length < 2 || idNum.length < 8 || !email.includes('@'));
    }

    async function handleAuth() {
        const name = document.getElementById('reg-name').value.trim();
        const idNum = document.getElementById('reg-id').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const user = auth.currentUser;

        if(!user) return;

        // שמירה מקומית ראשונית
        const userData = { name, idNum, email, groupId: null };
        localStorage.setItem('mda_user', JSON.stringify(userData));
        showDashboard(userData);
    }

    function showDashboard(user) {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('student-screen').classList.remove('hidden');
        document.getElementById('st-name').innerText = user.name;

        if (user.groupId) {
            document.getElementById('no-group-ui').classList.add('hidden');
            document.getElementById('active-group-ui').classList.remove('hidden');
            document.getElementById('group-display').innerText = `קבוצה: ${user.groupCode || 'פעילה'}`;
            startListener(user.groupId);
            loadHistory(user);
        } else {
            document.getElementById('no-group-ui').classList.remove('hidden');
            document.getElementById('active-group-ui').classList.add('hidden');
        }
    }

    async function joinGroup() {
        const code = document.getElementById('join-group-code').value.trim();
        const user = auth.currentUser;
        const saved = JSON.parse(localStorage.getItem('mda_user'));

        if(!code) return alert("הזן קוד קבוצה");

        const gSnap = await db.collection('groups_v2').where('code', '==', code).limit(1).get();
        if(!gSnap.empty) {
            const groupDoc = gSnap.docs[0];
            const groupId = groupDoc.id;
            
            // רישום החניך בתוך ה-roster של הקבוצה
            await groupDoc.ref.collection('roster').doc(user.uid).set({
                name: saved.name,
                idNum: saved.idNum,
                email: saved.email,
                uid: user.uid
            }, { merge: true });

            saved.groupId = groupId;
            saved.groupCode = code;
            localStorage.setItem('mda_user', JSON.stringify(saved));
            showDashboard(saved);
            alert("שובצת לקבוצה בהצלחה!");
        } else {
            alert("קוד קבוצה לא נמצא במערכת");
        }
    }

    function startListener(gid) {
        db.collection('groups_v2').doc(gid).collection('meetings').where('isOpen', '==', true)
        .onSnapshot(s => {
            const ui = document.getElementById('active-ui');
            const label = document.getElementById('meeting-status');
            if(s.empty) { label.innerText = "אין מפגש פעיל כרגע"; ui.classList.add('hidden'); }
            else {
                window.curM = { id: s.docs[0].id, ref: s.docs[0].ref, ...s.docs[0].data() };
                label.innerText = "המפגש פתוח - ניתן לדווח!";
                ui.classList.remove('hidden');
            }
        });
    }

    async function doCheckIn() {
        const user = auth.currentUser;
        const saved = JSON.parse(localStorage.getItem('mda_user'));
        navigator.geolocation.getCurrentPosition(async p => {
            await window.curM.ref.collection('attendance').doc(user.uid).set({
                name: saved.name, idNum: saved.idNum,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            confetti(); alert("הנוכחות נרשמה!");
            loadHistory(saved);
        }, () => alert("חובה לאשר GPS לדיווח"));
    }

    async function loadHistory(user) {
        const mSnap = await db.collection('groups_v2').doc(user.groupId).collection('meetings').get();
        let html = "";
        for (const doc of mSnap.docs) {
            const att = await doc.ref.collection('attendance').doc(auth.currentUser.uid).get();
            html += `<div style="display:flex; justify-content:space-between; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">
                <span>מפגש ${doc.data().number || ''}</span>
                <span class="${att.exists ? 'badge badge-present' : 'badge badge-absent'}">${att.exists ? 'נוכח' : 'חיסור'}</span>
            </div>`;
        }
        document.getElementById('st-history').innerHTML = html || "אין היסטוריית מפגשים";
    }

    function toggleProfile(show) { document.getElementById('profile-screen').classList.toggle('hidden', !show); }
    
    async function saveProfile() {
        const phone = document.getElementById('p-phone').value.trim();
        const user = auth.currentUser;
        const saved = JSON.parse(localStorage.getItem('mda_user'));
        if(saved.groupId) {
            await db.collection('groups_v2').doc(saved.groupId).collection('roster').doc(user.uid).set({ phone }, { merge: true });
            alert("עודכן!");
            toggleProfile(false);
        }
    }

    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
