<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Attendance System</title>

<style>
body {background:#0b0f1a;color:white;font-family:Arial;text-align:center;}
.card {background:#111827;margin:10px;padding:10px;border-radius:10px;}
button {padding:10px;margin:5px;border:none;border-radius:8px;background:#1e90ff;color:white;}
input {padding:10px;margin:5px;}
.green{background:#16a34a;}
.orange{background:#f97316;}
.red{background:#dc2626;}
</style>
</head>

<body>

<h1>מערכת נוכחות</h1>

<div id="auth">
<input id="email" placeholder="email"><br>
<input id="password" type="password" placeholder="password"><br>
<select id="role">
<option value="student">תלמיד</option>
<option value="instructor">מדריך</option>
</select><br>
<button onclick="register()">הרשמה</button>
<button onclick="login()">כניסה</button>
</div>

<div id="app" style="display:none">

<h2 id="userInfo"></h2>

<div class="card">
<h3>קבוצה</h3>
<input id="groupName" placeholder="שם קבוצה">
<button onclick="createGroup()">צור קבוצה</button><br>

<input id="joinCode" placeholder="קוד קבוצה">
<button onclick="joinGroup()">הצטרף</button>

<div id="groups"></div>
</div>

<div class="card">
<h3>מפגש</h3>
<button onclick="openSession()">פתח מפגש</button>
<button onclick="markAttendance()">אני בשיעור</button>
</div>

<div class="card">
<h3>נוכחות</h3>
<div id="attendanceList"></div>
</div>

<div class="card">
<h3>חריגים (מדריך)</h3>
<div id="exceptions"></div>
</div>

<button onclick="logout()">התנתק</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, addDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "attendancemda.firebaseapp.com",
  projectId: "attendancemda"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let currentUser, role, currentGroup=null;

// ===== AUTH =====

window.register = async ()=>{
  const user = await createUserWithEmailAndPassword(auth,email.value,password.value);

  await setDoc(doc(db,"users",user.user.uid),{
    email:email.value,
    role:roleSelect.value
  });

  alert("נרשמת");
};

window.login = async ()=>{
  const res = await signInWithEmailAndPassword(auth,email.value,password.value);
  currentUser = res.user;

  const userDoc = await getDoc(doc(db,"users",currentUser.uid));
  role = userDoc.data().role;

  authDiv.style.display="none";
  app.style.display="block";

  userInfo.innerText = role;

  loadGroups();
  listenAttendance();
  listenExceptions();
};

// ===== GROUPS =====

window.createGroup = async ()=>{
  if(role !== "instructor") return alert("רק מדריך");

  const code = Math.random().toString(36).substring(2,7);

  await addDoc(collection(db,"groups"),{
    name:groupName.value,
    code,
    instructor:currentUser.uid
  });

  alert("קוד: "+code);
};

window.joinGroup = async ()=>{
  const q = query(collection(db,"groups"), where("code","==",joinCode.value));

  onSnapshot(q, snap=>{
    snap.forEach(async g=>{
      await addDoc(collection(db,"members"),{
        groupId:g.id,
        userId:currentUser.uid
      });
      currentGroup = g.id;
    });
  });
};

// realtime groups
function loadGroups(){
  const q = query(collection(db,"members"), where("userId","==",currentUser.uid));

  onSnapshot(q, async snap=>{
    groups.innerHTML="";

    for(const m of snap.docs){
      const g = await getDoc(doc(db,"groups",m.data().groupId));

      const div = document.createElement("div");
      div.innerText = g.data().name;
      div.onclick = ()=> currentGroup = m.data().groupId;

      groups.appendChild(div);
    }
  });
}

// ===== SESSION =====

window.openSession = ()=>{
navigator.geolocation.getCurrentPosition(async pos=>{
  await setDoc(doc(db,"sessions",currentGroup),{
    lat:pos.coords.latitude,
    lng:pos.coords.longitude,
    start:Date.now(),
    open:true
  });

  alert("נפתח");
});
};

// ===== ATTENDANCE =====

window.markAttendance = ()=>{
navigator.geolocation.getCurrentPosition(async pos=>{

  const session = (await getDoc(doc(db,"sessions",currentGroup))).data();

  const dist = distance(
    pos.coords.latitude,
    pos.coords.longitude,
    session.lat,
    session.lng
  );

  if(dist > 0.07){
    await addDoc(collection(db,"exceptions"),{
      user:currentUser.uid,
      group:currentGroup,
      dist,
      time:Date.now()
    });
    alert("חריג נשלח");
    return;
  }

  let status = Date.now()-session.start > 5*60*1000 ? "late" : "on_time";

  await addDoc(collection(db,"attendance"),{
    user:currentUser.uid,
    group:currentGroup,
    status,
    time:Date.now()
  });

});
};

// realtime attendance
function listenAttendance(){
  const q = query(
    collection(db,"attendance"),
    where("group","==",currentGroup || "")
  );

  onSnapshot(q, snap=>{
    attendanceList.innerHTML="";

    snap.forEach(a=>{
      const d=a.data();

      const div=document.createElement("div");

      div.className =
        d.status==="on_time" ? "green" :
        d.status==="late" ? "orange" : "red";

      div.innerText = d.user + " | " + d.status;

      attendanceList.appendChild(div);
    });
  });
}

// ===== EXCEPTIONS =====

function listenExceptions(){
  if(role !== "instructor") return;

  const q = query(collection(db,"exceptions"));

  onSnapshot(q, snap=>{
    exceptions.innerHTML="";

    snap.forEach(e=>{
      const d=e.data();

      const div=document.createElement("div");

      div.innerText = d.user + " חריג";

      const btn=document.createElement("button");
      btn.innerText="אשר";

      btn.onclick=async ()=>{
        await addDoc(collection(db,"attendance"),{
          user:d.user,
          group:d.group,
          status:"approved",
          time:Date.now()
        });
      };

      div.appendChild(btn);
      exceptions.appendChild(div);
    });
  });
}

// ===== UTILS =====

function distance(lat1,lon1,lat2,lon2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;

  const a=Math.sin(dLat/2)**2+
  Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
  Math.sin(dLon/2)**2;

  return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

window.logout = async ()=>{
  await signOut(auth);
  location.reload();
};

// refs
const email=document.getElementById("email");
const password=document.getElementById("password");
const roleSelect=document.getElementById("role");
const authDiv=document.getElementById("auth");
</script>

</body>
  </html>
