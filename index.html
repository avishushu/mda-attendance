<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>נוכחות מד"א - מערכת מנוהלת</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --mda-red: #e31e24; --mda-dark: #1a252f; --bg-light: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Assistant', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-light); margin: 0; padding: 0; min-height: 100vh; }

        .app-header { background: var(--mda-red); padding: 40px 20px 80px; border-radius: 0 0 50px 50px; color: white; text-align: center; }
        .main-container { max-width: 480px; margin: -60px auto 40px; padding: 0 20px; }
        .card { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin-bottom: 25px; }

        input { width: 100%; padding: 18px; margin: 12px 0; border: 2px solid #e2e8f0; border-radius: 20px; font-size: 16px; }
        input:focus { border-color: var(--mda-red); outline: none; }

        .btn-primary { width: 100%; padding: 18px; border: none; border-radius: 20px; font-weight: 800; font-size: 18px; cursor: pointer; color: white; background: linear-gradient(135deg, #e31e24, #b9181d); transition: 0.3s; }
        .btn-primary:disabled { background: #cbd5e0; cursor: not-allowed; box-shadow: none; }

        .pulse-button { width: 130px; height: 130px; border-radius: 50%; background: var(--mda-red); border: none; color: white; font-size: 22px; font-weight: 800; cursor: pointer; animation: pulse 2s infinite; margin: 20px auto; display: block; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(227, 30, 36, 0.7); } 70% { box-shadow: 0 0 0 25px rgba(227, 30, 36, 0); } 100% { box-shadow: 0 0 0 0 rgba(227, 30, 36, 0); } }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; padding: 20px; overflow-y: auto; }
        .hidden { display: none !important; }
        .required-label::after { content: " *"; color: var(--mda-red); }
        .alert-box { background: #fff5f5; border: 1px solid #feb2b2; color: #c53030; padding: 15px; border-radius: 15px; margin-bottom: 15px; font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="app-header"><h1>נוכחות מתנדבים</h1></div>
    <div class="main-container">
        <div class="card" style="text-align: center;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a8/Magen_David_Adom_Logo.svg/500px-Magen_David_Adom_Logo.svg.png" style="max-height: 70px; margin-bottom: 15px;">
            <input type="text" id="reg-name" placeholder="שם מלא" oninput="validateAuthForm()">
            <input type="number" id="reg-id" placeholder="תעודת זהות" inputmode="numeric" oninput="validateAuthForm()">
            <input type="text" id="reg-code" placeholder="קוד קבוצה (אופציונלי)">
            <button class="btn-primary" id="btn-login" disabled onclick="handleAuth()">כניסה למערכת</button>
        </div>
    </div>
</div>

<div id="student-screen" class="hidden">
    <div class="app-header">
        <div style="display:flex; justify-content:space-between; align-items:center; padding: 0 10px;">
            <div style="text-align: right;">
                <h2 id="st-name" style="margin:0; font-size:24px; font-weight: 800;">---</h2>
                <div onclick="toggleProfile(true)" style="cursor:pointer; font-size: 13px; text-decoration: underline;">⚙️ הגדרות פרופיל</div>
            </div>
            <button onclick="logout()" style="background:white; border:none; color:var(--mda-red); padding:10px 15px; border-radius:15px; font-weight:700;">התנתק</button>
        </div>
    </div>
    <div class="main-container">
        <div id="missing-info-alert" class="alert-box hidden">
            שים לב! עליך להשלים מייל וטלפון כדי לדווח נוכחות.
            <button onclick="toggleProfile(true)" style="display:block; margin-top:10px; background:var(--mda-red); color:white; border:none; padding:5px 10px; border-radius:5px;">להשלמת פרטים</button>
        </div>

        <div class="card" style="text-align:center;">
            <div id="meeting-status" style="font-weight:700; font-size:18px;">מחפש מפגש...</div>
            <div id="active-ui" class="hidden">
                <button class="pulse-button" id="btn-report" onclick="checkRedirectAndReport()">דווח!</button>
                <p style="color:#64748b; font-weight: 600;">יש לאשר מיקום (GPS)</p>
            </div>
        </div>
        <h3>היסטוריית נוכחות</h3>
        <div class="card" id="st-history">טוען...</div>
    </div>
</div>

<div id="profile-screen" class="overlay hidden">
    <div style="max-width: 480px; margin: 0 auto;">
        <h2 style="margin-top:20px;">השלמת פרטי חובה</h2>
        <p style="color:gray;">כדי להשתמש באפליקציה, עליך למלא את הפרטים הבאים:</p>
        
        <label class="required-label">כתובת אימייל</label>
        <input type="email" id="p-email" placeholder="example@gmail.com">
        
        <label class="required-label">מספר טלפון</label>
        <input type="tel" id="p-phone" placeholder="05XXXXXXXX">
        
        <label>עיר מגורים</label>
        <input type="text" id="p-city" placeholder="שם העיר">

        <button class="btn-primary" style="margin-top:20px;" onclick="saveProfile()">שמור וסיים</button>
        <button onclick="toggleProfile(false)" id="close-profile-btn" style="width:100%; background:none; border:none; color:gray; margin-top:15px; cursor:pointer;">חזור</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyA7JlU7Qc6uuSP43khqCBC96KFQpk5dgOE",
      authDomain: "attendancemda.firebaseapp.com",
      projectId: "attendancemda",
      storageBucket: "attendancemda.firebasestorage.app",
      messagingSenderId: "303165146059",
      appId: "1:303165146059:web:606d5d5ece96d9fe702c4e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    let isProfileComplete = false;

    auth.signInAnonymously();

    function validateAuthForm() {
        const name = document.getElementById('reg-name').value.trim();
        const idNum = document.getElementById('reg-id').value.trim();
        document.getElementById('btn-login').disabled = (name.length < 2 || idNum.length < 8);
    }

    async function handleAuth() {
        const name = document.getElementById('reg-name').value.trim();
        const idNum = document.getElementById('reg-id').value.trim();
        const code = document.getElementById('reg-code').value.trim();
        const user = auth.currentUser;

        let groupId = null;
        if(code) {
            const gSnap = await db.collection('groups_v2').where('code', '==', code).limit(1).get();
            if(!gSnap.empty) {
                groupId = gSnap.docs[0].id;
                await gSnap.docs[0].ref.collection('roster').doc(user.uid).set({ name, idNum, uid: user.uid }, {merge:true});
            }
        }

        const userData = { name, idNum, groupId };
        localStorage.setItem('mda_user', JSON.stringify(userData));
        showDashboard(userData);
    }

    async function showDashboard(user) {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('student-screen').classList.remove('hidden');
        document.getElementById('st-name').innerText = user.name;
        
        // בדיקת תקינות פרופיל
        if(user.groupId) {
            const doc = await db.collection('groups_v2').doc(user.groupId).collection('roster').doc(auth.currentUser.uid).get();
            const data = doc.data() || {};
            isProfileComplete = (!!data.email && !!data.phone);
            
            document.getElementById('missing-info-alert').classList.toggle('hidden', isProfileComplete);
            
            startListener(user.groupId);
            loadHistory(user);
        }
    }

    function checkRedirectAndReport() {
        if(!isProfileComplete) {
            alert("עליך להשלים מייל וטלפון לפני שתוכל לדווח.");
            toggleProfile(true);
        } else {
            doCheckIn();
        }
    }

    function toggleProfile(show) {
        document.getElementById('profile-screen').classList.toggle('hidden', !show);
        // אם החניך חייב להשלים פרטים, נסתיר את כפתור הסגירה כדי שלא יברח
        document.getElementById('close-profile-btn').classList.toggle('hidden', !isProfileComplete && show);
    }

    async function saveProfile() {
        const email = document.getElementById('p-email').value.trim();
        const phone = document.getElementById('p-phone').value.trim();
        if(!email || !phone) return alert("אימייל וטלפון הם שדות חובה!");

        const user = auth.currentUser;
        const saved = JSON.parse(localStorage.getItem('mda_user'));

        try {
            await db.collection('groups_v2').doc(saved.groupId).collection('roster').doc(user.uid).update({
                email, phone, city: document.getElementById('p-city').value
            });
            isProfileComplete = true;
            alert("הפרטים נשמרו!");
            toggleProfile(false);
            showDashboard(saved);
        } catch(e) { alert("שגיאה בשמירה"); }
    }

    // שאר הפונקציות (startListener, doCheckIn, loadHistory) נשארות כפי שהיו
    function startListener(gid) {
        db.collection('groups_v2').doc(gid).collection('meetings').where('isOpen', '==', true).onSnapshot(s => {
            const ui = document.getElementById('active-ui');
            const label = document.getElementById('meeting-status');
            if(s.empty) { label.innerText = "אין מפגש פעיל"; ui.classList.add('hidden'); }
            else {
                window.curM = { id: s.docs[0].id, ref: s.docs[0].ref, ...s.docs[0].data() };
                label.innerHTML = `<span style="color:var(--mda-red)">●</span> מפגש ${window.curM.number || ""} פתוח`;
                ui.classList.remove('hidden');
            }
        });
    }

    async function doCheckIn() {
        const user = auth.currentUser;
        const savedData = JSON.parse(localStorage.getItem('mda_user'));
        navigator.geolocation.getCurrentPosition(async p => {
            await window.curM.ref.collection('attendance').doc(user.uid).set({
                name: savedData.name, idNum: savedData.idNum,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            confetti(); alert("נוכחותך נרשמה!");
            loadHistory(savedData);
        }, () => alert("חובה לאשר GPS"));
    }

    async function loadHistory(user) {
        const mSnap = await db.collection('groups_v2').doc(user.groupId).collection('meetings').orderBy('number', 'desc').get();
        const results = await Promise.all(mSnap.docs.map(m => m.ref.collection('attendance').doc(auth.currentUser.uid).get()));
        let html = "";
        results.forEach((att, i) => {
            html += `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #eee;">
                <span>מפגש ${mSnap.docs[i].data().number || (i+1)}</span>
                <span style="color:${att.exists?'green':'red'}">${att.exists?'נוכח':'חיסור'}</span>
            </div>`;
        });
        document.getElementById('st-history').innerHTML = html || "אין היסטוריה";
    }

    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
