<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Attendance System PRO UI</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0f1f;
  color:white;
}

.hidden{display:none}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:#111a2e;
  padding:15px;
  margin:10px 0;
  border-radius:12px;
}

input,button,select{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{
  background:#2563eb;
  color:white;
  cursor:pointer;
}

button:hover{background:#1d4ed8}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.tag{
  padding:5px 10px;
  border-radius:6px;
  display:inline-block;
}

.on{background:#16a34a}
.late{background:#f97316}
.absent{background:#dc2626}

.header{
  font-size:22px;
  margin-bottom:10px;
}

.small{opacity:0.7;font-size:12px}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginScreen">
  <h1>מערכת נוכחות</h1>

  <input id="email" placeholder="email"><br>
  <input id="password" type="password" placeholder="password"><br>

  <select id="role">
    <option value="student">תלמיד</option>
    <option value="instructor">מדריך</option>
  </select><br>

  <button onclick="login()">כניסה</button>
  <button onclick="register()">הרשמה</button>
</div>

<!-- DASHBOARD -->
<div id="app" class="hidden">

  <div class="header" id="userLabel"></div>

  <div class="grid">

    <!-- GROUPS -->
    <div class="card">
      <h3>קבוצות</h3>

      <input id="groupName" placeholder="שם קבוצה">
      <button onclick="createGroup()">צור</button><br>

      <input id="joinCode" placeholder="קוד קבוצה">
      <button onclick="joinGroup()">הצטרף</button>

      <div id="groups"></div>
    </div>

    <!-- SESSION -->
    <div class="card">
      <h3>מפגש</h3>
      <button onclick="openSession()">פתח מפגש</button>
      <button onclick="mark()">אני בשיעור</button>
      <button onclick="endSession()">סיים</button>
      <div class="small">נוכחות מתעדכנת בזמן אמת</div>
    </div>

  </div>

  <!-- ATTENDANCE -->
  <div class="card">
    <h3>נוכחות</h3>
    <div id="attendance"></div>
  </div>

  <!-- STATS -->
  <div class="card">
    <h3>סטטיסטיקה</h3>
    <canvas id="chart"></canvas>
  </div>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, addDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "attendancemda.firebaseapp.com",
  projectId: "attendancemda"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let user, role, group=null;

// ===== AUTH =====

window.register = async ()=>{
  const u = await createUserWithEmailAndPassword(auth,email.value,password.value);

  await setDoc(doc(db,"users",u.user.uid),{
    email:email.value,
    role:role.value
  });

  alert("נרשמת");
};

window.login = async ()=>{
  const r = await signInWithEmailAndPassword(auth,email.value,password.value);
  user = r.user;

  const d = await getDoc(doc(db,"users",user.uid));
  role = d.data().role;

  loginScreen.classList.add("hidden");
  app.classList.remove("hidden");

  userLabel.innerText = role + " מחובר";

  listenAttendance();
};

// ===== GROUPS =====

window.createGroup = async ()=>{
  const code = Math.random().toString(36).substring(2,7);

  await addDoc(collection(db,"groups"),{
    name:groupName.value,
    code,
    instructor:user.uid
  });

  alert(code);
};

window.joinGroup = async ()=>{
  group = joinCode.value;
};

// ===== SESSION =====

window.openSession = async ()=>{
  navigator.geolocation.getCurrentPosition(async p=>{
    await setDoc(doc(db,"sessions",group),{
      lat:p.coords.latitude,
      lng:p.coords.longitude,
      start:Date.now()
    });
  });
};

window.mark = async ()=>{
  navigator.geolocation.getCurrentPosition(async p=>{
    const s = await getDoc(doc(db,"sessions",group));

    const d = distance(p.coords.latitude,p.coords.longitude,s.data().lat,s.data().lng);

    let status = d < 0.07 ? "on" : "late";

    await addDoc(collection(db,"attendance"),{
      user:user.uid,
      group,
      status,
      time:Date.now()
    });
  });
};

window.endSession = ()=>{
  alert("הסתיים");
};

// ===== REALTIME =====

function listenAttendance(){
  const q = query(collection(db,"attendance"), where("group","==",group));

  onSnapshot(q, snap=>{
    attendance.innerHTML="";

    let on=0,late=0,abs=0;

    snap.forEach(s=>{
      const d=s.data();

      if(d.status==="on") on++;
      if(d.status==="late") late++;

      const div=document.createElement("div");

      div.innerHTML = `
        <span class="tag ${d.status}">${d.status}</span>
        ${d.user}
      `;

      attendance.appendChild(div);
    });

    drawChart(on,late,abs);
  });
}

// ===== SIMPLE CHART =====

function drawChart(on,late,abs){
  const c=document.getElementById("chart");
  const ctx=c.getContext("2d");

  c.width=300;c.height=150;

  ctx.clearRect(0,0,300,150);

  const data=[on,late,abs];
  const colors=["#16a34a","#f97316","#dc2626"];

  data.forEach((v,i)=>{
    ctx.fillStyle=colors[i];
    ctx.fillRect(i*80+30,150-v*10,40,v*10);
  });
}

// ===== UTIL =====

function distance(a,b,c,d){
  const R=6371;
  const x=(c-a)*Math.PI/180;
  const y=(d-b)*Math.PI/180;

  const z=Math.sin(x/2)**2+
  Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;

  return R*(2*Math.atan2(Math.sqrt(z),Math.sqrt(1-z)));
}
</script>

</body>
</html>
