<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Attendance MVP</title>

<style>
body{
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
  margin:0;
}

.screen{display:none;padding:20px}
.active{display:block}

.card{
  background:#111a2e;
  padding:15px;
  margin:10px;
  border-radius:10px;
}

input,button,select{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

button{background:#2563eb;color:white}

.tag{padding:5px 10px;border-radius:6px}
.on{background:#16a34a}
.late{background:#f97316}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen active">
  <h2>כניסה</h2>

  <input id="email" placeholder="email"><br>
  <input id="pass" type="password" placeholder="password"><br>

  <select id="role">
    <option value="student">תלמיד</option>
    <option value="instructor">מדריך</option>
  </select><br>

  <button onclick="register()">הרשמה</button>
  <button onclick="login()">כניסה</button>
</div>

<!-- APP -->
<div id="app" class="screen">

  <h3 id="info"></h3>

  <div class="card">
    <h3>קבוצה</h3>
    <input id="groupInput" placeholder="קוד קבוצה">
    <button onclick="join()">הצטרף</button>
    <button onclick="create()">צור קבוצה</button>
    <div id="groupBox"></div>
  </div>

  <div class="card">
    <h3>מפגש</h3>
    <button onclick="openSession()">פתח מפגש</button>
    <button onclick="mark()">אני בשיעור</button>
  </div>

  <div class="card">
    <h3>נוכחות</h3>
    <div id="list"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, addDoc, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let user=null;
let role=null;
let group=null;

// ===== AUTH =====

window.register = async ()=>{
  const u = await createUserWithEmailAndPassword(auth,email.value,pass.value);

  await setDoc(doc(db,"users",u.user.uid),{
    role:role.value,
    email:email.value
  });

  alert("נרשמת");
};

window.login = async ()=>{
  const r = await signInWithEmailAndPassword(auth,email.value,pass.value);

  user = r.user;

  const d = await getDoc(doc(db,"users",user.uid));
  role = d.data().role;

  switchScreen("app");
  info.innerText = role;

  listen();
};

// ===== NAV =====

function switchScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// ===== GROUP =====

window.create = async ()=>{
  group = Math.random().toString(36).substring(2,7);

  await setDoc(doc(db,"groups",group),{
    owner:user.uid
  });

  alert("קוד: "+group);
};

window.join = ()=>{
  group = groupInput.value;
  listen();
};

// ===== SESSION =====

window.openSession = async ()=>{
  navigator.geolocation.getCurrentPosition(async p=>{
    if(!group) return alert("אין קבוצה");

    await setDoc(doc(db,"sessions",group),{
      lat:p.coords.latitude,
      lng:p.coords.longitude,
      start:Date.now()
    });

    alert("נפתח מפגש");
  });
};

// ===== MARK =====

window.mark = ()=>{
  navigator.geolocation.getCurrentPosition(async p=>{
    if(!group) return alert("אין קבוצה");

    const s = await getDoc(doc(db,"sessions",group));

    const d = distance(
      p.coords.latitude,
      p.coords.longitude,
      s.data().lat,
      s.data().lng
    );

    let status = d < 0.07 ? "on" : "late";

    await addDoc(collection(db,"attendance"),{
      user:user.uid,
      group,
      status,
      time:Date.now()
    });
  });
};

// ===== REALTIME =====

function listen(){
  if(!group) return;

  const q = query(collection(db,"attendance"), where("group","==",group));

  onSnapshot(q, snap=>{
    list.innerHTML="";

    snap.forEach(d=>{
      const a=d.data();

      const div=document.createElement("div");
      div.innerHTML = `<span class="tag ${a.status}">${a.status}</span> ${a.user}`;

      list.appendChild(div);
    });
  });
}

// ===== UTIL =====

function distance(a,b,c,d){
  const R=6371;
  const x=(c-a)*Math.PI/180;
  const y=(d-b)*Math.PI/180;

  const z=Math.sin(x/2)**2+
  Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(y/2)**2;

  return R*(2*Math.atan2(Math.sqrt(z),Math.sqrt(1-z)));
}
</script>

</body>
</html>
