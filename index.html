<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Attendance PRO MAX</title>

<style>
body {background:#0b0f1a;color:white;font-family:Arial;text-align:center;}
.card {background:#111827;margin:10px;padding:10px;border-radius:10px;}
button {padding:10px;margin:5px;border:none;border-radius:8px;background:#1e90ff;color:white;}
input {padding:10px;margin:5px;}

.green{background:#16a34a;}
.orange{background:#f97316;}
.red{background:#dc2626;}
.gray{background:#6b7280;}
</style>
</head>

<body>

<h1>מערכת נוכחות</h1>

<div id="auth">
<input id="name" placeholder="שם מלא"><br>
<input id="email" placeholder="email"><br>
<input id="password" type="password"><br>

<select id="role">
<option value="student">תלמיד</option>
<option value="instructor">מדריך</option>
</select><br>

<button onclick="register()">הרשמה</button>
<button onclick="login()">כניסה</button>
</div>

<div id="app" style="display:none">

<h2 id="userInfo"></h2>

<div class="card">
<h3>קבוצות</h3>
<input id="groupName" placeholder="שם קבוצה">
<button onclick="createGroup()">צור</button><br>

<input id="joinCode" placeholder="קוד">
<button onclick="joinGroup()">הצטרף</button>

<div id="groups"></div>
</div>

<div class="card">
<h3>מפגש</h3>
<button onclick="openSession()">פתח</button>
<button onclick="endSession()">סיים</button>
<button onclick="markAttendance()">אני בשיעור</button>
</div>

<div class="card">
<h3>נוכחות</h3>
<div id="attendanceList"></div>
</div>

<div class="card" id="exceptionsCard" style="display:none">
<h3>חריגים</h3>
<div id="exceptions"></div>
</div>

<button onclick="logout()">התנתק</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, addDoc, collection, query, where, onSnapshot, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "attendancemda.firebaseapp.com",
  projectId: "attendancemda"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let currentUser, role, currentGroup=null;
let usersCache = {};
let sessionActive=false;

// ===== AUTH =====

window.register = async ()=>{
  const u = await createUserWithEmailAndPassword(auth,email.value,password.value);

  await setDoc(doc(db,"users",u.user.uid),{
    name:name.value,
    role:roleSelect.value
  });

  alert("נרשמת");
};

window.login = async ()=>{
  const res = await signInWithEmailAndPassword(auth,email.value,password.value);
  currentUser = res.user;

  const userDoc = await getDoc(doc(db,"users",currentUser.uid));
  role = userDoc.data().role;

  userInfo.innerText = userDoc.data().name + " | " + role;

  authDiv.style.display="none";
  app.style.display="block";

  if(role==="instructor"){
    exceptionsCard.style.display="block";
    listenExceptions();
  }

  loadGroups();
};

// ===== GROUP =====

window.createGroup = async ()=>{
  if(role!=="instructor") return alert("רק מדריך");

  const code = Math.random().toString(36).substring(2,7);

  await addDoc(collection(db,"groups"),{
    name:groupName.value,
    code,
    instructor:currentUser.uid
  });

  alert("קוד: "+code);
};

window.joinGroup = async ()=>{
  const snap = await getDocs(query(collection(db,"groups"), where("code","==",joinCode.value)));

  snap.forEach(async g=>{
    await addDoc(collection(db,"members"),{
      groupId:g.id,
      userId:currentUser.uid
    });
    currentGroup = g.id;
    listenAttendance();
  });
};

function loadGroups(){
  onSnapshot(query(collection(db,"members"), where("userId","==",currentUser.uid)), async snap=>{
    groups.innerHTML="";

    for(const m of snap.docs){
      const g = await getDoc(doc(db,"groups",m.data().groupId));

      const div=document.createElement("div");
      div.innerText = g.data().name;

      div.onclick=()=>{
        currentGroup = m.data().groupId;
        listenAttendance();
      };

      groups.appendChild(div);
    }
  });
}

// ===== SESSION =====

window.openSession = ()=>{
navigator.geolocation.getCurrentPosition(async pos=>{
  await setDoc(doc(db,"sessions",currentGroup),{
    lat:pos.coords.latitude,
    lng:pos.coords.longitude,
    start:Date.now(),
    open:true
  });

  sessionActive=true;
  alert("נפתח");
});
};

window.endSession = async ()=>{
  sessionActive=false;

  // mark absents
  const membersSnap = await getDocs(query(collection(db,"members"), where("groupId","==",currentGroup)));

  const attSnap = await getDocs(query(collection(db,"attendance"), where("group","==",currentGroup)));

  const attended = attSnap.docs.map(d=>d.data().user);

  for(const m of membersSnap.docs){
    if(!attended.includes(m.data().userId)){
      await addDoc(collection(db,"attendance"),{
        user:m.data().userId,
        group:currentGroup,
        status:"absent",
        time:Date.now()
      });
    }
  }

  alert("מפגש הסתיים");
};

// ===== ATTENDANCE =====

window.markAttendance = ()=>{
navigator.geolocation.getCurrentPosition(async pos=>{

  const session = (await getDoc(doc(db,"sessions",currentGroup))).data();

  const dist = distance(pos.coords.latitude,pos.coords.longitude,session.lat,session.lng);

  if(dist > 0.07){
    await addDoc(collection(db,"exceptions"),{
      user:currentUser.uid,
      group:currentGroup,
      dist,
      time:Date.now()
    });
    return alert("חריג נשלח");
  }

  let status = Date.now()-session.start > 5*60*1000 ? "late" : "on_time";

  await addDoc(collection(db,"attendance"),{
    user:currentUser.uid,
    group:currentGroup,
    status,
    time:Date.now()
  });

});
};

// realtime attendance
function listenAttendance(){
  onSnapshot(query(collection(db,"attendance"), where("group","==",currentGroup)), async snap=>{
    attendanceList.innerHTML="";

    for(const a of snap.docs){
      const d=a.data();

      if(!usersCache[d.user]){
        const u = await getDoc(doc(db,"users",d.user));
        usersCache[d.user]=u.data().name;
      }

      const div=document.createElement("div");

      div.className =
        d.status==="on_time" ? "green" :
        d.status==="late" ? "orange" :
        d.status==="absent" ? "red" : "gray";

      div.innerText = usersCache[d.user] + " - " + d.status;

      // instructor edit
      if(role==="instructor"){
        div.onclick=async ()=>{
          await addDoc(collection(db,"logs"),{
            editor:currentUser.uid,
            user:d.user,
            old:d.status,
            new:"approved",
            time:Date.now()
          });

          await addDoc(collection(db,"attendance"),{
            user:d.user,
            group:currentGroup,
            status:"approved",
            time:Date.now()
          });
        };
      }

      attendanceList.appendChild(div);
    }
  });
}

// ===== EXCEPTIONS =====

function listenExceptions(){
  onSnapshot(collection(db,"exceptions"), snap=>{
    exceptions.innerHTML="";

    snap.forEach(e=>{
      const d=e.data();

      const div=document.createElement("div");
      div.innerText = d.user + " חריג ("+d.dist.toFixed(2)+"km)";

      const btn=document.createElement("button");
      btn.innerText="אשר";

      btn.onclick=async ()=>{
        await addDoc(collection(db,"attendance"),{
          user:d.user,
          group:d.group,
          status:"approved",
          time:Date.now()
        });

        await deleteDoc(e.ref);
      };

      div.appendChild(btn);
      exceptions.appendChild(div);
    });
  });
}

// ===== UTIL =====

function distance(lat1,lon1,lat2,lon2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;

  const a=Math.sin(dLat/2)**2+
  Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
  Math.sin(dLon/2)**2;

  return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

window.logout = async ()=>{
  await signOut(auth);
  location.reload();
};

const name=document.getElementById("name");
const email=document.getElementById("email");
const password=document.getElementById("password");
const roleSelect=document.getElementById("role");
const authDiv=document.getElementById("auth");
</script>

</body>
</html>
