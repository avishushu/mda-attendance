<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>נוכחות קורס חובשים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .mda-red { background-color: #D32F2F; }
        .mda-black { background-color: #1A1A1A; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <header class="mda-black text-white p-6 text-center shadow-lg">
        <h1 class="text-2xl font-bold">נוכחות קורס חובשים</h1>
        <button onclick="switchRole()" class="text-red-500 text-sm mt-2 underline">החלף תצוגה (מדריך/תלמיד)</button>
    </header>

    <main class="p-4 max-w-md mx-auto">
        <div id="student-view" class="bg-white rounded-xl shadow-md p-6 border-t-4 border-red-600">
            <h2 class="text-xl font-bold mb-2">מפגש מס' 14 - החייאה</h2>
            <p class="text-gray-600 mb-6">סטטוס: פתוח לרישום</p>
            
            <button id="checkin-btn" onclick="handleCheckIn()" class="w-full mda-black text-white py-4 rounded-lg font-bold text-lg active:scale-95 transition-transform">
                אני בשיעור
            </button>
            <p id="status-msg" class="mt-4 text-center font-bold hidden"></p>
        </div>

        <div id="instructor-view" class="hidden space-y-4">
            <div class="bg-white rounded-xl shadow-md p-6 border-t-4 border-red-600">
                <h2 class="text-xl font-bold mb-4">ניהול מדריך</h2>
                <button class="w-full mda-red text-white py-3 rounded-lg font-bold">פתח רישום נוכחות</button>
            </div>
            
            <h3 class="font-bold text-lg mt-6">נוכחות בכיתה בזמן אמת:</h3>
            <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                <div class="flex justify-between items-center p-4 border-b">
                    <span>ישראל ישראלי</span>
                    <span class="bg-green-600 text-white px-3 py-1 rounded text-sm">בזמן</span>
                </div>
                <div class="flex justify-between items-center p-4 border-b">
                    <span>יוסי כהן</span>
                    <span class="bg-yellow-500 text-white px-3 py-1 rounded text-sm">איחור (5 דק')</span>
                </div>
                <div class="flex justify-between items-center p-4">
                    <span>אבי לוי</span>
                    <span class="bg-gray-800 text-white px-3 py-1 rounded text-sm">טרם הגיע</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        let isStudent = true;
        // מיקום דמה של המדריך
        const instLoc = { lat: 32.0853, lng: 34.7818 };

        function switchRole() {
            isStudent = !isStudent;
            document.getElementById('student-view').classList.toggle('hidden', !isStudent);
            document.getElementById('instructor-view').classList.toggle('hidden', isStudent);
        }

        function handleCheckIn() {
            const btn = document.getElementById('checkin-btn');
            const msg = document.getElementById('status-msg');
            
            btn.innerText = "בודק מיקום...";
            btn.disabled = true;

            if (!navigator.geolocation) {
                alert("הדפדפן שלך לא תומך במיקום");
                return;
            }

            navigator.geolocation.getCurrentPosition((pos) => {
                const dist = 0; // לצורך הבדיקה בדפדפן נניח שהמיקום תקין
                
                btn.style.backgroundColor = "#388E3C";
                btn.innerText = "נרשמת בהצלחה!";
                msg.innerText = "הנוכחות נקלטה במיקום תקין";
                msg.classList.remove('hidden');
                msg.classList.add('text-green-600');
            }, (err) => {
                btn.disabled = false;
                btn.innerText = "אני בשיעור";
                alert("חובה לאשר הרשאת מיקום בדפדפן");
            });
        }
    </script>
</body>
</html>
