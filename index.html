<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מערכת נוכחות</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { --mda-red: #e31e24; --mda-dark: #1a252f; --bg-light: #f8fafc; }
        * { box-sizing: border-box; font-family: 'Assistant', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-light); margin: 0; padding: 0; min-height: 100vh; }

        .app-header { background: var(--mda-red); padding: 40px 20px 80px; border-radius: 0 0 50px 50px; color: white; text-align: center; }
        .main-container { max-width: 480px; margin: -60px auto 40px; padding: 0 20px; }
        .card { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin-bottom: 25px; border: 1px solid rgba(0,0,0,0.03); }

        .app-title { font-size: 32px; font-weight: 800; margin-bottom: 5px; letter-spacing: -1px; }
        .app-subtitle { font-size: 16px; opacity: 0.9; font-weight: 400; }

        input { width: 100%; padding: 18px; margin: 12px 0; border: 2px solid #e2e8f0; border-radius: 20px; font-size: 16px; background: #fff; }
        input:focus { border-color: var(--mda-red); outline: none; box-shadow: 0 0 0 4px rgba(227, 30, 36, 0.1); }

        .btn-primary { width: 100%; padding: 18px; border: none; border-radius: 20px; font-weight: 800; font-size: 18px; cursor: pointer; color: white; background: linear-gradient(135deg, #e31e24, #b9181d); box-shadow: 0 8px 20px rgba(227, 30, 36, 0.3); transition: 0.3s; }
        .btn-primary:disabled { background: #cbd5e0; cursor: not-allowed; box-shadow: none; }

        .pulse-button { width: 130px; height: 130px; border-radius: 50%; background: var(--mda-red); border: none; color: white; font-size: 22px; font-weight: 800; cursor: pointer; animation: pulse 2s infinite; margin: 20px auto; display: block; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(227, 30, 36, 0.7); } 70% { box-shadow: 0 0 0 25px rgba(227, 30, 36, 0); } 100% { box-shadow: 0 0 0 0 rgba(227, 30, 36, 0); } }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; padding: 20px; overflow-y: auto; }
        .hidden { display: none !important; }
        
        .history-item { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #f1f5f9; }
        .badge { padding: 6px 14px; border-radius: 10px; font-size: 13px; font-weight: 700; }
        .badge-present { background: #dcfce7; color: #166534; }
        .badge-absent { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="app-header">
        <div class="app-title">מערכת נוכחות</div>
        <div class="app-subtitle">מתנדבי מגן דוד אדום</div>
    </div>
    <div class="main-container">
        <div class="card" style="text-align: center;">
            <h3 style="margin-top: 0; color: var(--mda-dark);">כניסה למערכת</h3>
            <input type="text" id="reg-name" placeholder="שם מלא" oninput="validateAuthForm()">
            <input type="number" id="reg-id" placeholder="תעודת זהות" inputmode="numeric" oninput="validateAuthForm()">
            <input type="text" id="reg-code" placeholder="קוד קבוצה (אופציונלי)">
            <button class="btn-primary" id="btn-login" disabled onclick="handleAuth()">התחברות</button>
        </div>
    </div>
</div>

<div id="student-screen" class="hidden">
    <div class="app-header">
        <div style="display:flex; justify-content:space-between; align-items:center; padding: 0 10px;">
            <div style="text-align: right;">
                <h2 id="st-name" style="margin:0; font-size:22px; font-weight: 800;">---</h2>
                <div onclick="toggleProfile(true)" style="cursor:pointer; font-size: 13px; text-decoration: underline; opacity: 0.9;">⚙️ עדכון פרטים</div>
            </div>
            <button onclick="logout()" style="background:white; border:none; color:var(--mda-red); padding:10px 15px; border-radius:15px; font-weight:700; font-size:13px; cursor:pointer;">התנתק</button>
        </div>
    </div>
    <div class="main-container">
        <div class="card" style="text-align:center;">
            <div id="meeting-status" style="font-weight:700; font-size:18px; margin-bottom: 10px;">מחפש מפגש...</div>
            <div id="active-ui" class="hidden">
                <button class="pulse-button" id="btn-report" onclick="doCheckIn()">דווח!</button>
                <p style="color:#64748b; font-weight: 600; font-size: 14px;">נא לוודא שמיקום ה-GPS מאושר</p>
            </div>
        </div>
        <h3 style="margin-right: 10px;">היסטוריית נוכחות</h3>
        <div class="card" id="st-history">טוען נתונים...</div>
    </div>
</div>

<div id="profile-screen" class="overlay hidden">
    <div style="max-width: 480px; margin: 0 auto;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2>עדכון פרטים</h2>
            <button onclick="toggleProfile(false)" style="background:none; border:none; font-size:24px; cursor:pointer;">✕</button>
        </div>
        <p style="color:gray; font-size: 14px;">הזן את פרטי הקשר שלך לעדכון המערכת.</p>
        <input type="email" id="p-email" placeholder="אימייל (אופציונלי)">
        <input type="tel" id="p-phone" placeholder="טלפון (אופציונלי)">
        <button class="btn-primary" style="margin-top:20px;" id="btn-save-profile" onclick="saveProfile()">שמור שינויים</button>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyA7JlU7Qc6uuSP43khqCBC96KFQpk5dgOE",
      authDomain: "attendancemda.firebaseapp.com",
      projectId: "attendancemda",
      storageBucket: "attendancemda.firebasestorage.app",
      messagingSenderId: "303165146059",
      appId: "1:303165146059:web:606d5d5ece96d9fe702c4e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();
    let meetingListener = null;

    // חיבור אנונימי ראשוני
    auth.signInAnonymously().catch(e => console.error("Auth init error:", e));

    function validateAuthForm() {
        const name = document.getElementById('reg-name').value.trim();
        const idNum = document.getElementById('reg-id').value.trim();
        document.getElementById('btn-login').disabled = (name.length < 2 || idNum.length < 8);
    }

    async function handleAuth() {
        const name = document.getElementById('reg-name').value.trim();
        const idNum = document.getElementById('reg-id').value.trim();
        const code = document.getElementById('reg-code').value.trim();
        const user = auth.currentUser;

        if(!user) return alert("שגיאת מערכת - נסה לרענן");

        let groupId = null;
        if(code) {
            const gSnap = await db.collection('groups_v2').where('code', '==', code).limit(1).get();
            if(!gSnap.empty) {
                groupId = gSnap.docs[0].id;
                // שימוש ב-SET עם MERGE כדי ליצור/לעדכן את רשומת החניך
                await gSnap.docs[0].ref.collection('roster').doc(user.uid).set({ 
                    name, 
                    idNum, 
                    uid: user.uid,
                    lastLogin: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
            } else {
                alert("קוד קבוצה לא נמצא");
                return;
            }
        }

        const userData = { name, idNum, groupId };
        localStorage.setItem('mda_user', JSON.stringify(userData));
        showDashboard(userData);
    }

    function showDashboard(user) {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('student-screen').classList.remove('hidden');
        document.getElementById('st-name').innerText = user.name;
        if(user.groupId) {
            startListener(user.groupId);
            loadHistory(user);
        }
    }

    function toggleProfile(show) {
        document.getElementById('profile-screen').classList.toggle('hidden', !show);
        if(show) loadProfileData();
    }

    async function loadProfileData() {
        const user = auth.currentUser;
        const saved = JSON.parse(localStorage.getItem('mda_user'));
        if(!user || !saved.groupId) return;
        
        try {
            const doc = await db.collection('groups_v2').doc(saved.groupId).collection('roster').doc(user.uid).get();
            if(doc.exists) {
                const data = doc.data();
                document.getElementById('p-email').value = data.email || "";
                document.getElementById('p-phone').value = data.phone || "";
            }
        } catch(e) { console.error("Error loading profile:", e); }
    }

    async function saveProfile() {
        const user = auth.currentUser;
        const saved = JSON.parse(localStorage.getItem('mda_user'));
        const btn = document.getElementById('btn-save-profile');

        if(!user || !saved.groupId) return alert("אנא התחבר מחדש");

        btn.disabled = true;
        btn.innerText = "שומר...";

        try {
            // תיקון קריטי: שימוש ב-set עם merge במקום update
            await db.collection('groups_v2').doc(saved.groupId).collection('roster').doc(user.uid).set({
                email: document.getElementById('p-email').value.trim(),
                phone: document.getElementById('p-phone').value.trim(),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
            
            alert("הפרטים עודכנו בהצלחה!");
            toggleProfile(false);
        } catch(e) { 
            console.error(e);
            alert("שגיאה בעדכון: " + e.message); 
        } finally {
            btn.disabled = false;
            btn.innerText = "שמור שינויים";
        }
    }

    function startListener(gid) {
        if(meetingListener) meetingListener();
        meetingListener = db.collection('groups_v2').doc(gid).collection('meetings')
            .where('isOpen', '==', true).onSnapshot(s => {
                const ui = document.getElementById('active-ui');
                const label = document.getElementById('meeting-status');
                if(s.empty) { label.innerText = "אין מפגש פתוח לדיווח"; ui.classList.add('hidden'); }
                else {
                    window.curM = { id: s.docs[0].id, ref: s.docs[0].ref, ...s.docs[0].data() };
                    label.innerHTML = `<span style="color:var(--mda-red)">●</span> מפגש פתוח`;
                    ui.classList.remove('hidden');
                }
            });
    }

    async function doCheckIn() {
        const user = auth.currentUser;
        const savedData = JSON.parse(localStorage.getItem('mda_user'));
        const btn = document.getElementById('btn-report');
        if(!window.curM) return;

        btn.disabled = true;
        navigator.geolocation.getCurrentPosition(async p => {
            try {
                await window.curM.ref.collection('attendance').doc(user.uid).set({
                    name: savedData.name, 
                    idNum: savedData.idNum,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    location: new firebase.firestore.GeoPoint(p.coords.latitude, p.coords.longitude)
                });
                confetti(); alert("דיווחת נוכחות בהצלחה!");
                loadHistory(savedData);
            } catch(e) { alert("שגיאה בדיווח: המפגש כנראה נסגר"); }
            finally { btn.disabled = false; }
        }, () => { alert("יש לאשר גישת GPS כדי לדווח"); btn.disabled = false; });
    }

    async function loadHistory(user) {
        const container = document.getElementById('st-history');
        try {
            const mSnap = await db.collection('groups_v2').doc(user.groupId).collection('meetings').orderBy('number', 'desc').limit(10).get();
            const results = await Promise.all(mSnap.docs.map(m => m.ref.collection('attendance').doc(auth.currentUser.uid).get()));
            
            let html = "";
            results.forEach((att, i) => {
                html += `<div class="history-item">
                    <span style="font-weight:700;">מפגש ${mSnap.docs[i].data().number || (i+1)}</span>
                    <span class="badge ${att.exists ? 'badge-present' : 'badge-absent'}">${att.exists ? 'נוכח' : 'חיסור'}</span>
                </div>`;
            });
            container.innerHTML = html || "אין היסטוריה להצגה";
        } catch(e) { container.innerHTML = "שגיאה בטעינת היסטוריה"; }
    }

    function logout() { localStorage.clear(); location.reload(); }

    // טעינה אוטומטית אם כבר מחובר
    window.onload = () => {
        const saved = localStorage.getItem('mda_user');
        if(saved) {
            const parsed = JSON.parse(saved);
            // מחכה לוודא שה-Auth התחבר אנונימית
            auth.onAuthStateChanged(user => {
                if(user) showDashboard(parsed);
            });
        }
    };
</script>
</body>
</html>
